<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitTodo 格式化生成器</title>
    <script src="https://unpkg.com/blockly/blockly.min.js">
    </script>
    <script src="https://unpkg.com/blockly/blocks.js">
    </script>
    <script src="https://unpkg.com/blockly/msg/zh-hans.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #1f2937;
        }
        .app {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
        }
        .toolbar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            flex-wrap: wrap;
            gap: 8px 16px;
            min-height: 60px;
        }
        .toolbar .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toolbar .brand h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #111827;
        }
        .toolbar .brand .badge {
            font-size: 12px;
            background: #e5e7eb;
            padding: 2px 10px;
            border-radius: 12px;
            color: #4b5563;
        }
        .toolbar .actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .toolbar .actions button {
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            color: #1f2937;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .toolbar .actions button:hover {
            background: #e5e7eb;
            border-color: #9ca3af;
        }
        .toolbar .actions button.primary {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        .toolbar .actions button.primary:hover {
            background: #2563eb;
            border-color: #2563eb;
        }
        .toolbar .actions button.danger {
            color: #dc2626;
            border-color: #fca5a5;
        }
        .toolbar .actions button.danger:hover {
            background: #fee2e2;
        }

        .main {
            flex: 1;
            display: flex;
            min-height: 0;
        }
        .blockly-wrapper {
            flex: 1;
            min-width: 0;
            height: 100%;
            background: #ffffff;
            position: relative;
        }
        .blockly-wrapper #blocklyDiv {
            width: 100%;
            height: 100%;
        }
        .output-panel {
            flex: 0 0 340px;
            background: #f9fafb;
            border-left: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            padding: 20px 20px 24px;
            overflow-y: auto;
        }
        .output-panel .output-label {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .output-panel .output-box {
            flex: 1;
            background: #ffffff;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 16px;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 15px;
            line-height: 1.6;
            color: #1f2937;
            word-break: break-all;
            white-space: pre-wrap;
            overflow-y: auto;
            min-height: 120px;
            transition: border-color 0.2s;
        }
        .output-panel .output-box:focus {
            border-color: #3b82f6;
            outline: none;
        }
        .output-panel .output-box.empty {
            color: #9ca3af;
            font-style: italic;
        }
        .output-panel .output-box.error {
            color: #dc2626;
            border-color: #fca5a5;
            background: #fef2f2;
        }
        .output-panel .debug-info {
            margin-top: 8px;
            padding: 8px 12px;
            background: #f3f4f6;
            border-radius: 4px;
            font-size: 12px;
            color: #6b7280;
            font-family: monospace;
            max-height: 80px;
            overflow-y: auto;
            display: none;
        }
        .output-panel .debug-info.show {
            display: block;
        }
        .output-panel .copy-area {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .output-panel .copy-area button {
            padding: 8px 20px;
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .output-panel .copy-area button:hover {
            background: #2563eb;
        }
        .output-panel .copy-area .hint {
            font-size: 12px;
            color: #6b7280;
        }

        @media (max-width: 820px) {
            .main {
                flex-direction: column;
            }
            .blockly-wrapper {
                height: 55vh;
            }
            .output-panel {
                flex: 1;
                border-left: none;
                border-top: 1px solid #e5e7eb;
                padding: 16px 16px 20px;
            }
            .output-panel .output-box {
                min-height: 80px;
            }
        }
        @media (max-width: 480px) {
            .toolbar .brand h1 {
                font-size: 16px;
            }
            .toolbar .actions button {
                font-size: 12px;
                padding: 4px 10px;
            }
            .output-panel {
                padding: 12px 12px 16px;
            }
            .output-panel .output-box {
                font-size: 13px;
                padding: 12px;
            }
        }
        .output-box::-webkit-scrollbar {
            width: 6px;
        }
        .output-box::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }
        .output-box::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="toolbar">
            <div class="brand">
                <h1>GitTodo 格式化生成器</h1>
                <span class="badge">积木式构建</span>
            </div>
            <div class="actions">
                <button id="example1Btn">示例1 (语文%P1-2% %U1-3%)</button>
                <button id="example2Btn">示例2 (%W1-5 &amp; P1,3,5,7,9%)</button>
                <button id="example3Btn">示例3 (%P1-10:2|题目{num}%)</button>
                <button id="clearBtn" class="danger">清空</button>
                <button id="copyBtn" class="primary">复制结果</button>
            </div>
        </div>
        <div class="main">
            <div class="blockly-wrapper">
                <div id="blocklyDiv"></div>
            </div>
            <div class="output-panel">
                <div class="output-label">生成的格式化任务名</div>
                <div class="output-box" id="resultBox">拖拽积木到工作区，自动生成语法</div>
                <div class="debug-info" id="debugInfo"></div>
                <div class="copy-area">
                    <button id="copyBtnPanel">复制到剪贴板</button>
                    <span class="hint">点击结果框可全选</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ================================================================
            // 1. 自定义积木定义
            // ================================================================
            const blockDefinitions = [{
                "type": "range_continuous",
                "message0": "从 %1 到 %2",
                "args0": [
                    { "type": "field_number", "name": "START", "value": 1, "min": 0, "max": 999 },
                    { "type": "field_number", "name": "END", "value": 5, "min": 0, "max": 999 }
                ],
                "output": "NumberList",
                "colour": 300,
                "tooltip": "生成连续数字区间"
            }, {
                "type": "range_step",
                "message0": "从 %1 到 %2 步长 %3",
                "args0": [
                    { "type": "field_number", "name": "START", "value": 1, "min": 0, "max": 999 },
                    { "type": "field_number", "name": "END", "value": 10, "min": 0, "max": 999 },
                    { "type": "field_number", "name": "STEP", "value": 2, "min": 1, "max": 99 }
                ],
                "output": "NumberList",
                "colour": 300,
                "tooltip": "生成带步长的数字区间"
            }, {
                "type": "range_list",
                "message0": "数字列表 %1",
                "args0": [
                    { "type": "field_input", "name": "LIST", "text": "1,3,5,7" }
                ],
                "output": "NumberList",
                "colour": 300,
                "tooltip": "手动输入数字列表"
            }, {
                "type": "type_selector",
                "message0": "类型 %1",
                "args0": [
                    { "type": "field_dropdown", "name": "TYPE", "options": [
                            ["页 (P)", "P"],
                            ["步骤 (S)", "S"],
                            ["课时 (Q)", "Q"],
                            ["周 (W)", "W"],
                            ["天 (T)", "T"],
                            ["小时 (H)", "H"],
                            ["单元 (U)", "U"],
                            ["自定义 (#)", "#"]
                        ] }
                ],
                "output": "Type",
                "colour": 160,
                "tooltip": "选择步骤类型"
            }, {
                "type": "template_custom",
                "message0": "显示为 %1",
                "args0": [
                    { "type": "field_input", "name": "TEMPLATE", "text": "第{num}题" }
                ],
                "output": "Template",
                "colour": 230,
                "tooltip": "自定义显示格式"
            }, {
                "type": "template_default",
                "message0": "默认格式",
                "output": "Template",
                "colour": 230,
                "tooltip": "使用系统默认格式"
            }, {
                "type": "generate_blocks",
                "message0": "生成 %1 的 %2 格式 %3",
                "args0": [
                    { "type": "input_value", "name": "LIST", "check": "NumberList" },
                    { "type": "input_value", "name": "TYPE", "check": "Type" },
                    { "type": "input_value", "name": "TEMPLATE", "check": "Template" }
                ],
                "output": "BlockGroup",
                "colour": 60,
                "tooltip": "将数字列表转换为格式化步骤"
            }, {
                "type": "concat_blocks",
                "message0": "%1 接着 %2",
                "args0": [
                    { "type": "input_value", "name": "LEFT", "check": "BlockGroup" },
                    { "type": "input_value", "name": "RIGHT", "check": "BlockGroup" }
                ],
                "output": "BlockGroup",
                "colour": 200,
                "tooltip": "将两组步骤按顺序拼接"
            }, {
                "type": "pair_blocks",
                "message0": "%1 和 %2 配对",
                "args0": [
                    { "type": "input_value", "name": "LEFT", "check": "BlockGroup" },
                    { "type": "input_value", "name": "RIGHT", "check": "BlockGroup" }
                ],
                "output": "BlockGroup",
                "colour": 200,
                "tooltip": "将两组步骤按位置配对"
            }, {
                "type": "wrap_task",
                "message0": "标题前缀 %1 应用 %2",
                "args0": [
                    { "type": "field_input", "name": "PREFIX", "text": "语文" },
                    { "type": "input_value", "name": "BLOCKS", "check": "BlockGroup" }
                ],
                "output": "FinalResult",
                "colour": 330,
                "tooltip": "添加标题前缀，生成最终结果"
            }];

            blockDefinitions.forEach(def => {
                Blockly.Blocks[def.type] = {
                    init: function() { this.jsonInit(def); }
                };
            });

            // ================================================================
            // 2. 代码生成器
            // ================================================================
            const generator = new Blockly.Generator('GitTodo');

            function getField(block, name, defaultValue) {
                try {
                    const val = block.getFieldValue(name);
                    return (val !== undefined && val !== null) ? val : defaultValue;
                } catch (e) { return defaultValue; }
            }

            function getChildCode(block, name) {
                try {
                    const child = block.getInputTargetBlock(name);
                    if (!child) return null;
                    const result = generator.blockToCode(child);
                    if (result === null || result === undefined) return null;
                    if (Array.isArray(result)) {
                        return (typeof result[0] === 'string' && result[0].length > 0) ? result[0] : null;
                    }
                    if (typeof result === 'string') {
                        return result.length > 0 ? result : null;
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            }

            // ---- 数字源 ----
            generator.forBlock['range_continuous'] = function(block) {
                const start = getField(block, 'START', '1');
                const end = getField(block, 'END', '5');
                return [start + '-' + end, Blockly.Generator.ORDER_ATOMIC];
            };
            generator.forBlock['range_step'] = function(block) {
                const start = getField(block, 'START', '1');
                const end = getField(block, 'END', '10');
                const step = getField(block, 'STEP', '2');
                return [start + '-' + end + ':' + step, Blockly.Generator.ORDER_ATOMIC];
            };
            generator.forBlock['range_list'] = function(block) {
                const list = getField(block, 'LIST', '1,3,5');
                return [list, Blockly.Generator.ORDER_ATOMIC];
            };

            // ---- 类型 ----
            generator.forBlock['type_selector'] = function(block) {
                const type = getField(block, 'TYPE', 'P');
                return [type, Blockly.Generator.ORDER_ATOMIC];
            };

            // ---- 模板 ----
            generator.forBlock['template_custom'] = function(block) {
                const tmpl = getField(block, 'TEMPLATE', '{num}');
                return ['|' + tmpl, Blockly.Generator.ORDER_ATOMIC];
            };
            generator.forBlock['template_default'] = function(block) {
                return ['', Blockly.Generator.ORDER_ATOMIC];
            };

            // ---- 生成块 ----
            generator.forBlock['generate_blocks'] = function(block) {
                const list = getChildCode(block, 'LIST');
                const type = getChildCode(block, 'TYPE');
                const template = getChildCode(block, 'TEMPLATE');

                const listStr = (list !== null && list.length > 0) ? list : '1-5';
                const typeStr = (type !== null && type.length > 0) ? type : 'P';
                const templateStr = (template !== null) ? template : '';

                return ['%' + typeStr + listStr + templateStr + '%', Blockly.Generator.ORDER_ATOMIC];
            };

            // ---- 拼接块（关键修改：自动添加空格） ----
            generator.forBlock['concat_blocks'] = function(block) {
                const left = getChildCode(block, 'LEFT');
                const right = getChildCode(block, 'RIGHT');

                if (left === null && right === null) return ['', Blockly.Generator.ORDER_ATOMIC];
                if (left === null) return [right, Blockly.Generator.ORDER_ATOMIC];
                if (right === null) return [left, Blockly.Generator.ORDER_ATOMIC];

                // 去掉首尾的 %
                const l = left.replace(/^%|%$/g, '');
                const r = right.replace(/^%|%$/g, '');

                if (!l && !r) return ['', Blockly.Generator.ORDER_ATOMIC];
                if (!l) return ['%' + r + '%', Blockly.Generator.ORDER_ATOMIC];
                if (!r) return ['%' + l + '%', Blockly.Generator.ORDER_ATOMIC];

                // 关键修改：两个 %% 之间加空格 => %...% %...%
                return ['%' + l + '%' + ' ' + '%' + r + '%', Blockly.Generator.ORDER_ATOMIC];
            };

            // ---- 配对块 ----
            generator.forBlock['pair_blocks'] = function(block) {
                const left = getChildCode(block, 'LEFT');
                const right = getChildCode(block, 'RIGHT');

                if (left === null && right === null) return ['', Blockly.Generator.ORDER_ATOMIC];
                if (left === null) return [right, Blockly.Generator.ORDER_ATOMIC];
                if (right === null) return [left, Blockly.Generator.ORDER_ATOMIC];

                const l = left.replace(/^%|%$/g, '');
                const r = right.replace(/^%|%$/g, '');
                if (!l && !r) return ['', Blockly.Generator.ORDER_ATOMIC];
                if (!l) return ['%' + r + '%', Blockly.Generator.ORDER_ATOMIC];
                if (!r) return ['%' + l + '%', Blockly.Generator.ORDER_ATOMIC];
                return ['%' + l + ' & ' + r + '%', Blockly.Generator.ORDER_ATOMIC];
            };

            // ---- 包装块 ----
            generator.forBlock['wrap_task'] = function(block) {
                const prefix = getField(block, 'PREFIX', '');
                const blocks = getChildCode(block, 'BLOCKS');
                if (blocks === null || blocks.length === 0) {
                    return [prefix, Blockly.Generator.ORDER_ATOMIC];
                }
                // 如果前缀不为空，且 blocks 开头是 %，直接拼接
                if (prefix) {
                    return [prefix + blocks, Blockly.Generator.ORDER_ATOMIC];
                }
                return [blocks, Blockly.Generator.ORDER_ATOMIC];
            };

            // ================================================================
            // 3. 初始化 Blockly
            // ================================================================
            const toolbox = {
                "kind": "flyoutToolbox",
                "contents": [
                    { "kind": "label", "text": "数字源" },
                    { "kind": "block", "type": "range_continuous" },
                    { "kind": "block", "type": "range_step" },
                    { "kind": "block", "type": "range_list" },
                    { "kind": "label", "text": "类型" },
                    { "kind": "block", "type": "type_selector" },
                    { "kind": "label", "text": "模板" },
                    { "kind": "block", "type": "template_custom" },
                    { "kind": "block", "type": "template_default" },
                    { "kind": "label", "text": "生成器" },
                    { "kind": "block", "type": "generate_blocks" },
                    { "kind": "label", "text": "组合" },
                    { "kind": "block", "type": "concat_blocks" },
                    { "kind": "block", "type": "pair_blocks" },
                    { "kind": "label", "text": "包装" },
                    { "kind": "block", "type": "wrap_task" },
                ]
            };

            const workspace = Blockly.inject('blocklyDiv', {
                toolbox: toolbox,
                zoom: { controls: true, wheel: true, startScale: 0.85 },
                grid: { spacing: 20, length: 3, colour: '#ccc' },
                trashcan: true,
            });

            // ================================================================
            // 4. 输出更新
            // ================================================================
            const resultBox = document.getElementById('resultBox');
            const debugInfo = document.getElementById('debugInfo');

            function updateOutput() {
                const debugLines = [];
                try {
                    const topBlocks = workspace.getTopBlocks(false);
                    let finalBlock = null;

                    for (const block of topBlocks) {
                        if (block.outputConnection && block.type === 'wrap_task') {
                            finalBlock = block;
                            break;
                        }
                    }
                    if (!finalBlock) {
                        for (const block of topBlocks) {
                            if (block.outputConnection) {
                                finalBlock = block;
                                break;
                            }
                        }
                    }

                    if (!finalBlock) {
                        resultBox.textContent = '拖拽积木到工作区，自动生成语法';
                        resultBox.className = 'output-box empty';
                        debugInfo.className = 'debug-info';
                        return;
                    }

                    debugLines.push('顶层块: ' + finalBlock.type);

                    const code = generator.blockToCode(finalBlock);
                    debugLines.push('生成结果: ' + JSON.stringify(code));

                    if (code && Array.isArray(code) && typeof code[0] === 'string' && code[0].length > 0) {
                        resultBox.textContent = code[0];
                        resultBox.className = 'output-box';
                    } else if (typeof code === 'string' && code.length > 0) {
                        resultBox.textContent = code;
                        resultBox.className = 'output-box';
                    } else {
                        resultBox.textContent = '（生成的语法为空，请检查积木连接）';
                        resultBox.className = 'output-box empty';
                    }
                } catch (e) {
                    console.error('生成错误:', e);
                    resultBox.textContent = '错误: ' + e.message;
                    resultBox.className = 'output-box error';
                    debugLines.push('异常: ' + e.message);
                }

                if (debugLines.length > 0) {
                    debugInfo.textContent = debugLines.join('\n');
                    debugInfo.className = 'debug-info show';
                } else {
                    debugInfo.className = 'debug-info';
                }
            }

            workspace.addChangeListener(updateOutput);
            setTimeout(updateOutput, 300);

            // ================================================================
            // 5. 示例加载
            // ================================================================
            function loadExample(xmlText) {
                try {
                    workspace.clear();
                    const xml = Blockly.Xml.textToDom(xmlText);
                    Blockly.Xml.domToWorkspace(xml, workspace);
                    workspace.cleanUp();
                    setTimeout(updateOutput, 100);
                } catch (e) {
                    console.error('加载示例失败:', e);
                    alert('加载示例失败: ' + e.message + '\n请手动拼装积木。');
                }
            }

            // 示例1: 语文%P1-2% %U1-3%   (注意中间有空格)
            const example1 = `
                <xml xmlns="https://developers.google.com/blockly/xml">
                  <block type="wrap_task" x="100" y="50">
                    <field name="PREFIX">语文</field>
                    <value name="BLOCKS">
                      <block type="concat_blocks">
                        <value name="LEFT">
                          <block type="generate_blocks">
                            <value name="LIST">
                              <block type="range_continuous">
                                <field name="START">1</field>
                                <field name="END">2</field>
                              </block>
                            </value>
                            <value name="TYPE">
                              <block type="type_selector"><field name="TYPE">P</field></block>
                            </value>
                            <value name="TEMPLATE">
                              <block type="template_default"/>
                            </value>
                          </block>
                        </value>
                        <value name="RIGHT">
                          <block type="generate_blocks">
                            <value name="LIST">
                              <block type="range_continuous">
                                <field name="START">1</field>
                                <field name="END">3</field>
                              </block>
                            </value>
                            <value name="TYPE">
                              <block type="type_selector"><field name="TYPE">U</field></block>
                            </value>
                            <value name="TEMPLATE">
                              <block type="template_default"/>
                            </value>
                          </block>
                        </value>
                      </block>
                    </value>
                  </block>
                </xml>
            `;

            // 示例2: %W1-5 & P1,3,5,7,9%
            const example2 = `
                <xml xmlns="https://developers.google.com/blockly/xml">
                  <block type="wrap_task" x="100" y="50">
                    <field name="PREFIX"></field>
                    <value name="BLOCKS">
                      <block type="pair_blocks">
                        <value name="LEFT">
                          <block type="generate_blocks">
                            <value name="LIST">
                              <block type="range_continuous">
                                <field name="START">1</field>
                                <field name="END">5</field>
                              </block>
                            </value>
                            <value name="TYPE">
                              <block type="type_selector"><field name="TYPE">W</field></block>
                            </value>
                            <value name="TEMPLATE">
                              <block type="template_default"/>
                            </value>
                          </block>
                        </value>
                        <value name="RIGHT">
                          <block type="generate_blocks">
                            <value name="LIST">
                              <block type="range_list">
                                <field name="LIST">1,3,5,7,9</field>
                              </block>
                            </value>
                            <value name="TYPE">
                              <block type="type_selector"><field name="TYPE">P</field></block>
                            </value>
                            <value name="TEMPLATE">
                              <block type="template_default"/>
                            </value>
                          </block>
                        </value>
                      </block>
                    </value>
                  </block>
                </xml>
            `;

            // 示例3: %P1-10:2|题目{num}%
            const example3 = `
                <xml xmlns="https://developers.google.com/blockly/xml">
                  <block type="wrap_task" x="100" y="50">
                    <field name="PREFIX"></field>
                    <value name="BLOCKS">
                      <block type="generate_blocks">
                        <value name="LIST">
                          <block type="range_step">
                            <field name="START">1</field>
                            <field name="END">10</field>
                            <field name="STEP">2</field>
                          </block>
                        </value>
                        <value name="TYPE">
                          <block type="type_selector"><field name="TYPE">P</field></block>
                        </value>
                        <value name="TEMPLATE">
                          <block type="template_custom">
                            <field name="TEMPLATE">题目{num}</field>
                          </block>
                        </value>
                      </block>
                    </value>
                  </block>
                </xml>
            `;

            document.getElementById('example1Btn').addEventListener('click', function() {
                loadExample(example1);
            });
            document.getElementById('example2Btn').addEventListener('click', function() {
                loadExample(example2);
            });
            document.getElementById('example3Btn').addEventListener('click', function() {
                loadExample(example3);
            });

            document.getElementById('clearBtn').addEventListener('click', function() {
                if (workspace.getTopBlocks(false).length > 0 && !confirm('确定要清空工作区吗？')) return;
                workspace.clear();
                updateOutput();
            });

            // ================================================================
            // 6. 复制功能
            // ================================================================
            function copyResult() {
                const text = resultBox.textContent;
                if (!text || text.startsWith('拖拽') || text.startsWith('错误') || text.startsWith('（')) {
                    alert('暂无有效内容可复制，请先拼装积木');
                    return;
                }
                navigator.clipboard.writeText(text).then(() => {
                    const btns = document.querySelectorAll('#copyBtn, #copyBtnPanel');
                    btns.forEach(btn => {
                        const orig = btn.textContent;
                        btn.textContent = '已复制';
                        btn.style.background = '#22c55e';
                        setTimeout(() => {
                            btn.textContent = orig;
                            btn.style.background = '';
                        }, 1500);
                    });
                }).catch(() => {
                    const range = document.createRange();
                    range.selectNode(resultBox);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    alert('已复制到剪贴板');
                });
            }

            document.getElementById('copyBtn').addEventListener('click', copyResult);
            document.getElementById('copyBtnPanel').addEventListener('click', copyResult);

            resultBox.addEventListener('click', function() {
                if (this.textContent && !this.textContent.startsWith('拖拽') && !this.textContent.startsWith('错误') && !this
                    .textContent.startsWith('（')) {
                    const range = document.createRange();
                    range.selectNode(this);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                }
            });

            window.__workspace = workspace;

            console.log('GitTodo 格式化生成器已启动！');
            console.log('使用说明：从左侧拖拽积木到工作区，右侧自动生成语法。');
            console.log('两个 %% 之间会自动添加空格。');

        })();
    </script>
</body>
</html>
