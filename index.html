                    if (t.dueDate) {
                        const key = t.dueDate;
                        if (!tasksByDate[key]) tasksByDate[key] = [];
                        tasksByDate[key].push(t);
                    }
                });
            }

            let cells = '';
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            let headerHtml = weekDays.map(d => `<div class="cal-day-header">${d}</div>`).join('');

            const startOffset = firstDay;
            for (let i = startOffset - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                cells += `<div class="cal-cell" data-date="${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}" data-other="true">
                            <span class="cal-day-num other-month">${day}</span>
                        </div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                const tasks = tasksByDate[dateStr] || [];
                const isToday = dateStr === todayStr;
                const isSelected = dateStr === STATE.calSelectedDate;
                const dotHtml = tasks.slice(0, 6).map(t =>
                    `<span class="dot ${t.completed ? 'completed' : (isOverdue(dateStr) && !t.completed ? 'overdue' : '')}"></span>`
                ).join('');
                const countHtml = tasks.length > 6 ? `<span class="cal-count">+${tasks.length-6}</span>` : '';
                cells += `<div class="cal-cell ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}" data-date="${dateStr}">
                            <span class="cal-day-num">${d}</span>
                            <div class="cal-dot">${dotHtml}</div>
                            ${countHtml}
                        </div>`;
            }

            const totalCells = startOffset + daysInMonth;
            const remaining = (7 - totalCells % 7) % 7;
            for (let d = 1; d <= remaining; d++) {
                cells += `<div class="cal-cell" data-date="${year}-${String(month+2).padStart(2,'0')}-${String(d).padStart(2,'0')}" data-other="true">
                            <span class="cal-day-num other-month">${d}</span>
                        </div>`;
            }

            const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            let html = `
                    <div class="calendar-view">
                        <div class="calendar-header">
                            <button class="cal-nav" id="calPrev">‹</button>
                            <span class="cal-title">${year}年 ${monthNames[month]}</span>
                            <button class="cal-nav" id="calNext">›</button>
                            <button class="cal-nav" id="calToday" style="font-size:13px;padding:4px 10px;">今天</button>
                        </div>
                        <div class="calendar-grid">
                            ${headerHtml}
                            ${cells}
                        </div>
                        <div class="calendar-day-tasks" id="calDayTasks">
                            ${renderDayTasks(STATE.calSelectedDate, tasksByDate)}
                        </div>
                    </div>
                `;
            calendarContent.innerHTML = html;

            document.getElementById('calPrev')?.addEventListener('click', () => {
                STATE.calMonth--;
                if (STATE.calMonth < 0) { STATE.calMonth = 11;
                    STATE.calYear--; }
                renderCalendar();
            });
            document.getElementById('calNext')?.addEventListener('click', () => {
                STATE.calMonth++;
                if (STATE.calMonth > 11) { STATE.calMonth = 0;
                    STATE.calYear++; }
                renderCalendar();
            });
            document.getElementById('calToday')?.addEventListener('click', () => {
                STATE.calYear = new Date().getFullYear();
                STATE.calMonth = new Date().getMonth();
                STATE.calSelectedDate = todayStr;
                renderCalendar();
            });
            calendarContent.querySelectorAll('.cal-cell').forEach(el => {
                el.addEventListener('click', () => {
                    const date = el.dataset.date;
                    if (date) {
                        STATE.calSelectedDate = date;
                        renderCalendar();
                    }
                });
            });
        }

        function renderDayTasks(dateStr, tasksByDate) {
            if (!dateStr) {
                return `<div class="cdt-title">点击日期查看任务</div><div class="cdt-empty">选择日历中的某一天</div>`;
            }
            const tasks = tasksByDate[dateStr] || [];
            if (tasks.length === 0) {
                return `<div class="cdt-title">${dateStr}</div><div class="cdt-empty">这一天没有任务</div>`;
            }
            const taskHtml = tasks.map(t => {
                const done = t.completed ? 'cdt-done' : '';
                const overdue = t.dueDate && isOverdue(t.dueDate) && !t.completed;
                return `<div class="cdt-task" style="${overdue ? 'color:var(--overdue-color);' : ''}">
                            <span class="${done}">${escapeHtml(t.content)}</span>
                            ${t.completed ? ' [完成]' : ''}
                            ${overdue ? ' [逾期]' : ''}
                        </div>`;
            }).join('');
            return `<div class="cdt-title">${dateStr} (${tasks.length} 项任务)</div>${taskHtml}`;
        }

        // ============================================================
        //  事件绑定 - 任务列表交互
        // ============================================================
        todoList.addEventListener('click', async (e) => {
            const target = e.target.closest('button') || e.target;

            if (target.classList && target.classList.contains('expand-btn')) {
                const taskId = target.dataset.taskId;
                STATE.expandedTasks[taskId] = !STATE.expandedTasks[taskId];
                renderTasks();
                return;
            }

            if (target.classList && target.classList.contains('checkbox') && target.closest('.task-item')) {
                const taskId = target.dataset.taskId;
                const group = getCurrentGroup();
                if (!group) return;
                const task = group.tasks.find(t => t.id === taskId);
                if (!task) return;
                const newCompleted = !task.completed;
                task.completed = newCompleted;
                task.completedAt = newCompleted ? Date.now() : null;
                if (newCompleted && task.subtasks) task.subtasks.forEach(st => { st.completed = true; });
                saveAndSync();
                return;
            }

            if (target.classList && target.classList.contains('checkbox') && target.closest('.subtask-item')) {
                const subtaskId = target.dataset.subtaskId;
                const group = getCurrentGroup();
                if (!group) return;
                let foundTask = null,
                    foundSubtask = null;
                for (const task of group.tasks) {
                    const st = (task.subtasks || []).find(s => s.id === subtaskId);
                    if (st) { foundTask = task;
                        foundSubtask = st; break; }
                }
                if (!foundTask || !foundSubtask) return;
                foundSubtask.completed = !foundSubtask.completed;
                if (!foundSubtask.completed && foundTask.completed) {
                    foundTask.completed = false;
                    foundTask.completedAt = null;
                }
                if (foundSubtask.completed) {
                    const allCompleted = (foundTask.subtasks || []).every(s => s.completed === true);
                    if (allCompleted && !foundTask.completed) {
                        foundTask.completed = true;
                        foundTask.completedAt = Date.now();
                    }
                }
                saveAndSync();
                return;
            }

            if (target.classList && target.classList.contains('edit-task-btn')) {
                const taskId = target.dataset.taskId;
                const group = getCurrentGroup();
                if (!group) return;
                const task = group.tasks.find(t => t.id === taskId);
                if (!task) return;
                const result = await showTaskEditModal(task);
                if (result) {
                    task.content = result.content || task.content;
                    task.dueDate = result.dueDate || '';
                    task.notes = result.notes || '';
                    task.tags = result.tags || [];
                    saveAndSync();
                }
                return;
            }

            if (target.classList && target.classList.contains('delete-task-btn')) {
                const taskId = target.dataset.taskId;
                if (!confirm('确定删除此任务吗？')) return;
                const group = getCurrentGroup();
                if (!group) return;
                group.tasks = group.tasks.filter(t => t.id !== taskId);
                STATE.selectedTasks.delete(taskId);
                saveAndSync();
                return;
            }

            if (target.classList && target.classList.contains('task-select-btn')) {
                const taskId = target.dataset.taskId;
                const group = getCurrentGroup();
                if (!group) return;
                const task = group.tasks.find(t => t.id === taskId);
                if (!task) return;
                if (STATE.selectedTasks.has(taskId)) STATE.selectedTasks.delete(taskId);
                else STATE.selectedTasks.add(taskId);
                updateBatchBar();
                renderTasks();
                return;
            }

            if (target.classList && target.classList.contains('add-subtask-btn')) {
                const taskId = target.dataset.taskId;
                STATE.expandedTasks[taskId] = true;
                renderTasks();
                const result = await showInputModal('添加步骤', '');
                if (result !== null && result !== '') {
                    const parsed = parseStepName(result);
                    const group = getCurrentGroup();
                    if (!group) { alert('当前组未找到'); return; }
                    const task = group.tasks.find(t => t.id === taskId);
                    if (!task) { alert('任务未找到'); return; }
                    if (!task.subtasks) task.subtasks = [];
                    if (parsed && parsed.steps.length > 0) {
                        const newSubtasks = parsed.steps.map((stepText, idx) => ({
                            id: uuid(),
                            content: stepText,
                            completed: false,
                            order: task.subtasks.length + idx,
                        }));
                        task.subtasks.push(...newSubtasks);
                    } else {
                        const content = (parsed && parsed.displayName) || result;
                        task.subtasks.push({ id: uuid(), content, completed: false, order: task.subtasks.length });
                    }
                    saveAndSync();
                }
                return;
            }

            if (target.classList && target.classList.contains('add-subtask-confirm')) {
                const taskId = target.dataset.taskId;
                const row = target.closest('.add-subtask-row');
                if (!row) return;
                const input = row.querySelector('.add-subtask-input');
                if (!input) return;
                const text = input.value.trim();
                if (!text) return;
                const group = getCurrentGroup();
                if (!group) return;
                const task = group.tasks.find(t => t.id === taskId);
                if (!task) return;
                const parsed = parseStepName(text);
                if (!task.subtasks) task.subtasks = [];
                if (parsed && parsed.steps.length > 0) {
                    const newSubtasks = parsed.steps.map((stepText, idx) => ({
                        id: uuid(),
                        content: stepText,
                        completed: false,
                        order: task.subtasks.length + idx,
                    }));
                    task.subtasks.push(...newSubtasks);
                } else {
                    const content = (parsed && parsed.displayName) || text;
                    task.subtasks.push({ id: uuid(), content, completed: false, order: task.subtasks.length });
                }
                input.value = '';
                saveAndSync();
                return;
            }

            if (target.classList && target.classList.contains('subtask-delete')) {
                const subtaskId = target.dataset.subtaskId;
                if (!confirm('删除此步骤吗？')) return;
                const group = getCurrentGroup();
                if (!group) return;
                for (const task of group.tasks) {
                    const idx = (task.subtasks || []).findIndex(s => s.id === subtaskId);
                    if (idx !== -1) { task.subtasks.splice(idx, 1);
                        saveAndSync(); return; }
                }
                return;
            }

            if (target.classList && target.classList.contains('add-task-confirm')) {
                const groupId = target.dataset.groupId;
                const row = target.closest('.add-task-row');
                if (!row) return;
                const input = row.querySelector('.add-task-input');
                if (!input) return;
                const text = input.value.trim();
                if (!text) return;
                const group = STATE.groups.find(g => g.id === groupId);
                if (!group) return;
                const parsed = parseStepName(text);
                let taskName = text,
                    steps = [];
                if (parsed) { taskName = parsed.displayName || text;
                    steps = parsed.steps || []; }
                const newTask = {
                    id: uuid(),
                    content: taskName,
                    completed: false,
                    order: group.tasks.length,
                    createdAt: Date.now(),
                    completedAt: null,
                    dueDate: '',
                    notes: '',
                    tags: [],
                    subtasks: steps.map((stepText, idx) => ({ id: uuid(), content: stepText, completed: false,
                        order: idx })),
                };
                group.tasks.push(newTask);
                if (steps.length > 0) STATE.expandedTasks[newTask.id] = true;
                input.value = '';
                saveAndSync();
                return;
            }
        });

        todoList.addEventListener('keydown', (e) => {

                if (target.classList && target.classList.contains('add-subtask-input')) {

        });

                saveAndSync();

        // ============================================================
        //  导出 Word
        // ============================================================
        async function handleExportWord() {
            const group = getCurrentGroup();
            if (!group) { alert('请先选择一个任务组'); return; }
            if (!group.tasks || group.tasks.length === 0) { alert('当前任务组没有任务，无法导出'); return; }
            const config = await showExportModal(group.name);
            if (!config) return;
            const { includeSteps, stepFormat } = config;
            exportToWord(group, includeSteps, stepFormat);
        }

        function exportToWord(group, includeSteps, stepFormat) {
            const now = new Date();
            const dateStr = now.getFullYear() + '年' + String(now.getMonth() + 1).padStart(2, '0') + '月' + String(now.getDate())
                .padStart(2, '0') + '日 ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes())
                .padStart(2, '0');
            const tasks = group.tasks || [];
            sortByOrder(tasks);
            let tasksHtml = '';
            tasks.forEach(task => {
                const isCompleted = task.completed || false;
                const statusMark = isCompleted ? '[完成]' : '[ ]';
                const taskContent = escapeHtml(task.content);
                const subtasks = (task.subtasks || []).filter(s => s.content && s.content.trim() !== '');
                sortByOrder(subtasks);
                let stepsHtml = '';
                if (includeSteps && subtasks.length > 0) {
                    if (stepFormat === 'line') {
                        stepsHtml = '<ul style="margin-top:2px;margin-bottom:4px;padding-left:28px;list-style-type:circle;">';
                        subtasks.forEach(st => {
                            const stDone = st.completed ? ' [完成]' : '';
                            stepsHtml +=
                                `<li style="font-size:11pt;color:#555;line-height:1.6;">${escapeHtml(st.content)}${stDone}</li>`;
                        });
                        stepsHtml += '</ul>';
                    } else {
                        const stepTexts = subtasks.map(st => {
                            const stDone = st.completed ? '[v]' : '';
                            return escapeHtml(st.content) + (stDone ? stDone : '');
                        });
                        stepsHtml =
                            `<span style="font-size:11pt;color:#666;margin-left:6px;">（${stepTexts.join('、')}）</span>`;
                    }
                }
                let metaHtml = '';
                if (task.dueDate) {
                    const dueDisplay = formatDateDisplay(task.dueDate);
                    metaHtml +=
                        `<span style="font-size:10pt;color:#888;margin-left:8px;">[截止] ${dueDisplay}</span>`;
                }
                if (task.tags && task.tags.length > 0) {
                    metaHtml += task.tags.map(t =>
                        `<span style="font-size:9pt;background:#e8e8e8;padding:0 8px;border-radius:8px;margin-left:4px;">${escapeHtml(t)}</span>`
                    ).join('');
                }
                const taskLine = `${statusMark} ${taskContent}`;
                tasksHtml += `
                        <div style="margin-bottom:6px;padding:4px 0;border-bottom:1px solid #eee;">
                            <div style="font-size:12pt;line-height:1.7;${isCompleted ? 'color:#999;text-decoration:line-through;' : ''}">
                                ${taskLine} ${metaHtml}
                            </div>
                            ${stepsHtml}
                            ${task.notes ? `<div style="font-size:10pt;color:#888;margin-top:2px;padding-left:24px;">[备注] ${escapeHtml(task.notes)}</div>` : ''}
                        </div>
                    `;
            });
            const htmlContent = `
                    <!DOCTYPE html>
                    <html xmlns:o='urn:schemas-microsoft-com:office:office'
                          xmlns:w='urn:schemas-microsoft-com:office:word'
                          xmlns='http://www.w3.org/TR/REC-html40'>
                    <head><meta charset="UTF-8"><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
                    <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->
                    <style>
                        body { font-family: 'Microsoft YaHei','微软雅黑','PingFang SC','Helvetica Neue',Arial,sans-serif; font-size:12pt; line-height:1.6; color:#1f2937; padding:40px 50px; max-width:900px; margin:0 auto; background:#fff; }
                        .doc-title { font-size:22pt; font-weight:600; text-align:center; color:#1f2937; border-bottom:2px solid #3a7cae; padding-bottom:12px; margin-bottom:8px; }
                        .doc-meta { text-align:right; font-size:10pt; color:#9ca3af; margin-bottom:20px; }
                        .doc-task-list { margin-top:10px; }
                        .doc-footer { margin-top:30px; text-align:center; font-size:9pt; color:#d1d5db; border-top:1px solid #e5e7eb; padding-top:12px; }
                    </style>
                    </head>
                    <body>
                        <div class="doc-title">${escapeHtml(group.name)}</div>
                        <div class="doc-meta">导出日期：${dateStr}</div>
                        <div class="doc-task-list">${tasksHtml}</div>
                        <div class="doc-footer">— 由 GitTodo 生成 —</div>
                    </body>
                    </html>
                `;
            const blob = new Blob([htmlContent], { type: 'application/msword;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            const safeName = group.name.replace(/[\\/:*?"<>|]/g, '_');
            const dateFile = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate())
                .padStart(2, '0');
            link.download = `${safeName}_${dateFile}.doc`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // ============================================================
        //  导出 / 导入 JSON
        // ============================================================
        function handleExportJson() {
            if (!STATE.currentUser) { alert('未登录'); return; }
            const userData = STATE.todos[STATE.currentUser] || { groups: [] };
            const jsonStr = JSON.stringify(userData, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            const safeName = STATE.currentUser.replace(/[\\/:*?"<>|]/g, '_');
            const dateFile = new Date().toISOString().slice(0, 10);
            link.download = `${safeName}_${dateFile}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function handleImportJson() {
            if (!STATE.currentUser) { alert('未登录'); return; }
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (!imported.groups || !Array.isArray(imported.groups)) { alert('无效的 JSON 格式：缺少 groups 数组'); return; }
                        if (!confirm('导入将覆盖当前用户的所有数据，确定继续吗？')) return;
                        STATE.todos[STATE.currentUser] = { groups: imported.groups };
                        STATE.groups = imported.groups;
                        sortByOrder(STATE.groups);
                        STATE.currentGroupId = STATE.groups.length > 0 ? STATE.groups[0].id : null;
                        saveAndSync();
                    } catch (err) { alert('解析 JSON 失败: ' + err.message); }
                };
                reader.readAsText(file);
            };
            input.click();
        }

                switchHint.textContent = '还没有账号？';
                switchModeLink.textContent = '注册';
            }
            loginError.textContent = '';
        }

        async function handleLogin() {
            const username = loginUsername.value.trim();
            const password = loginPassword.value.trim();
            if (!username || !password) { loginError.textContent = '请输入用户名和密码'; return; }
            const encoded = encodePwd(password);
            if (isRegisterMode) {
                if (STATE.users[username]) { loginError.textContent = '用户名已存在'; return; }
                STATE.users[username] = encoded;
                STATE.todos[username] = { groups: [] };
                await saveAppData({ users: STATE.users, todos: STATE.todos });
                loginError.textContent = '注册成功，请登录';
                isRegisterMode = false;
                switchMode();
                loginUsername.value = username;
                loginPassword.value = '';
                return;
            } else {
                if (!STATE.users[username]) { loginError.textContent = '用户不存在'; return; }
                if (STATE.users[username] !== encoded) { loginError.textContent = '密码错误'; return; }
                localStorage.setItem('gittodo_user', username);
                STATE.currentUser = username;
                STATE.groups = (STATE.todos[username] && STATE.todos[username].groups) || [];
                sortByOrder(STATE.groups);
                STATE.currentGroupId = STATE.groups.length > 0 ? STATE.groups[0].id : null;
                loginOverlay.classList.add('hidden');
                appContainer.style.display = 'flex';
                const now = new Date();
                STATE.calYear = now.getFullYear();
                STATE.calMonth = now.getMonth();
                STATE.calSelectedDate = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(
                    now.getDate()).padStart(2, '0');
                renderAll();
                startPolling();
                setSyncStatus('已就绪');
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            }
        }

        function logout() {
            if (!confirm('确定退出登录吗？')) return;
            localStorage.removeItem('gittodo_user');
            STATE.currentUser = null;
            STATE.groups = [];
            STATE.currentGroupId = null;
            if (STATE.pollTimer) { clearInterval(STATE.pollTimer);
                STATE.pollTimer = null; }
            if (STATE.chartInstance) { STATE.chartInstance.destroy();
                STATE.chartInstance = null; }
            appContainer.style.display = 'none';
            loginOverlay.classList.remove('hidden');
            loginUsername.value = '';
            loginPassword.value = '';
            loginError.textContent = '';
            isRegisterMode = false;
            switchMode();
        }

        function getCurrentGroup() { return STATE.groups.find(g => g.id === STATE.currentGroupId); }

        async function handleAddGroup() {
            const name = await showInputModal('新建任务组', '新列表');
            if (name !== null && name !== '') {
                const newGroup = { id: uuid(), name: name.trim() || '未命名', order: STATE.groups.length,
                    createdAt: Date.now(), tasks: [] };
                STATE.groups.push(newGroup);
                STATE.currentGroupId = newGroup.id;
                if (STATE.currentView !== 'list') switchView('list');
                else saveAndSync();
                closeSidebar();
            }
        }

        // ============================================================
        //  每日总结 (浏览器通知)
        // ============================================================
        function checkDailySummary() {
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();
            if (hour === 20 && minute === 0) {
                sendDailySummary();
            }
        }

        function sendDailySummary() {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;
            const group = getCurrentGroup();
            if (!group) return;
            const tasks = group.tasks || [];
            let total = tasks.length;
            let done = tasks.filter(t => t.completed).length;
            let overdue = tasks.filter(t => t.dueDate && isOverdue(t.dueDate) && !t.completed).length;
            const rate = total === 0 ? 0 : Math.round((done / total) * 100);
            const msg = `今日总结\n列表: ${group.name}\n总任务: ${total}\n已完成: ${done}\n完成率: ${rate}%\n逾期: ${overdue}`;
            try {
                new Notification('GitTodo 每日总结', { body: msg });
            } catch (e) { console.log('通知发送失败'); }
        }

        setInterval(checkDailySummary, 60000);

        // ============================================================
        //  初始化
        // ============================================================
        async function init() {
            applyTheme(getPreferredTheme());
            const token = await fetchToken();
            if (!token) return;
            STATE.token = token;

            const data = await fetchAppData();
            if (data === null) {
                alert('无法获取数据，请检查网络或 Token 权限');
                return;
            }
            STATE.users = data.users || {};
            STATE.todos = data.todos || {};

            const savedUser = localStorage.getItem('gittodo_user');
            if (savedUser && STATE.todos[savedUser]) {
                STATE.currentUser = savedUser;
                STATE.groups = STATE.todos[savedUser].groups || [];
                sortByOrder(STATE.groups);
                STATE.currentGroupId = STATE.groups.length > 0 ? STATE.groups[0].id : null;
                const now = new Date();
                STATE.calYear = now.getFullYear();
                STATE.calMonth = now.getMonth();
                STATE.calSelectedDate = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(
                    now.getDate()).padStart(2, '0');
                loginOverlay.classList.add('hidden');
                appContainer.style.display = 'flex';
                renderAll();
                startPolling();
                setSyncStatus('已就绪');
                bindEvents();
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
                return;
            }

            isRegisterMode = false;
            switchMode();
            loginOverlay.classList.remove('hidden');
            appContainer.style.display = 'none';
            bindEvents();
        }

        function bindEvents() {
            loginBtn.removeEventListener('click', handleLogin);
            loginBtn.addEventListener('click', handleLogin);
            registerBtn.removeEventListener('click', () => {});
            registerBtn.addEventListener('click', () => {
                isRegisterMode = !isRegisterMode;
                switchMode();
            });
            switchModeLink.removeEventListener('click', () => {});
            switchModeLink.addEventListener('click', () => {
                isRegisterMode = !isRegisterMode;
                switchMode();
            });
            loginPassword.removeEventListener('keydown', handleLoginEnter);
            loginPassword.addEventListener('keydown', handleLoginEnter);
            loginUsername.removeEventListener('keydown', handleLoginEnter);
            loginUsername.addEventListener('keydown', handleLoginEnter);

            logoutBtn.removeEventListener('click', logout);
            logoutBtn.addEventListener('click', logout);

            exportWordBtn.removeEventListener('click', handleExportWord);
            exportWordBtn.addEventListener('click', handleExportWord);
            exportJsonBtn.removeEventListener('click', handleExportJson);
            exportJsonBtn.addEventListener('click', handleExportJson);
            importBtn.removeEventListener('click', handleImportJson);
            importBtn.addEventListener('click', handleImportJson);
        }

        function handleLoginEnter(e) {
            if (e.key === 'Enter') handleLogin();
        }

        // 修复移动端输入框焦点问题
        document.addEventListener('touchstart', (e) => {
            const target = e.target;
            if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.closest('.modal-box')) {
                e.stopPropagation();
            }
        }, { passive: true });

        init().catch(err => {
            console.error('初始化失败:', err);
            alert('初始化失败，请检查控制台错误');
        });

        console.log('GitTodo 已加载（统计仅当前组，含步骤完成率）');
    </script>
</body>
</html>
