<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>GitTodo · 任务管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
    <style>
        /* ===== 基础样式重置 & 变量 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }
        :root {
            --bg-primary: #f3f4f6;
            --bg-sidebar: #f3f4f6;
            --bg-main: #254e68;
            --bg-card: #f0f3f5;
            --bg-task: #e7ebee;
            --bg-task-hover: #dce1e6;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --radius: 8px;
            --accent: #3a7cae;
            --accent-hover: #2c5f8a;
            --danger: #e74c3c;
            --success: #27ae60;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        [data-theme="dark"] {
            --bg-primary: #1e1e1e;
            --bg-sidebar: #2d2d2d;
            --bg-main: #1a1a2e;
            --bg-card: #2d2d3d;
            --bg-task: #3a3a4a;
            --bg-task-hover: #4a4a5a;
            --text-primary: #e6edf3;
            --text-secondary: #b0c4de;
            --text-muted: #7a8a9a;
            --border-color: #404050;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
        }
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        /* ===== 登录界面 ===== */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.4s ease;
            padding: 20px;
        }
        #loginOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .login-box {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        .login-box h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .login-box p.sub {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .login-box .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .login-box .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .login-box .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            font-family: var(--font);
            transition: border 0.2s;
            -webkit-appearance: none;
        }
        .login-box .form-group input:focus {
            border-color: var(--accent);
        }
        .login-box .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .login-box .actions button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            font-family: var(--font);
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-box .actions .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .login-box .actions .btn-primary:hover {
            background: var(--accent-hover);
        }
        .login-box .actions .btn-secondary {
            background: var(--bg-task);
            color: var(--text-secondary);
        }
        .login-box .actions .btn-secondary:hover {
            background: var(--bg-task-hover);
        }
        .login-box .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }
        .login-box .switch-mode {
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .login-box .switch-mode a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        .login-box .switch-mode a:hover {
            text-decoration: underline;
        }

        /* ===== 主界面布局 ===== */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ===== 侧边栏 (PC & 移动) ===== */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 0 10px 0;
            flex-shrink: 0;
            overflow-y: auto;
            transition: transform 0.3s ease, background 0.2s, border 0.2s;
            z-index: 1000;
        }
        .sidebar .close-sidebar {
            display: none;
            align-self: flex-end;
            margin: 0 16px 12px 0;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }
        .profile-section {
            padding: 0 24px 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .profile-avatar {
            width: 44px;
            height: 44px;
            background-color: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .profile-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }
        .profile-info .name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .profile-info .email {
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
        }
        .profile-info .email:hover {
            color: var(--danger);
        }
        .search-box {
            margin: 0 16px 16px 16px;
            padding: 8px 12px;
            background: var(--bg-primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .search-box:hover,
        .search-box:focus-within {
            border-color: var(--accent);
        }
        .search-box svg {
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
            margin-right: 8px;
        }
        .search-box input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 13px;
            color: var(--text-primary);
        }
        .nav-list {
            flex: 1;
            margin: 0 16px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto;
        }
        .nav-list li {
            padding: 10px 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.15s;
        }
        .nav-list li:hover {
            background: var(--bg-task-hover);
        }
        .nav-list li.active {
            background: var(--bg-task);
            font-weight: 500;
            color: var(--accent);
        }
        .nav-list li svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            flex-shrink: 0;
        }
        .nav-list li .group-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nav-list .group-delete {
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
        }
        .nav-list li:hover .group-delete {
            opacity: 1;
        }
        .nav-list .group-delete:hover {
            color: var(--danger);
        }
        .nav-list .bottom-action {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .nav-list .bottom-action:hover {
            background: transparent;
            color: var(--accent);
        }

        /* ===== 主内容区 ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            overflow: hidden;
            transition: background 0.2s;
            position: relative;
        }
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 12px 20px;
            color: #fff;
            min-height: 64px;
        }
        .content-header .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .content-header .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
            padding: 4px 8px;
        }
        .content-header h1 {
            font-size: 20px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .header-actions button {
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-actions button:hover {
            opacity: 1;
        }
        .header-actions svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            stroke: currentColor;
            stroke-width: 1.5;
        }

        /* ===== 任务容器 ===== */
        .todo-container {
            flex: 1;
            background: var(--bg-card);
            margin: 0 16px 16px 16px;
            border-radius: 8px;
            overflow-y: auto;
            padding: 16px 0 10px 0;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.1);
            transition: background 0.2s;
            position: relative;
        }
        .filter-bar {
            padding: 0 16px 8px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }
        .filter-bar .filter-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-bar .filter-label svg {
            width: 14px;
            height: 14px;
            fill: var(--text-secondary);
        }
        .filter-bar .sync-status {
            font-size: 12px;
            color: var(--text-muted);
        }
        .todo-list {
            padding: 12px 16px 0 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ===== 任务卡片 ===== */
        .task-item-wrapper {
            background: var(--bg-task);
            border-radius: 6px;
            border-top: 2px solid var(--bg-card);
            border-bottom: 2px solid var(--bg-card);
            transition: background 0.15s;
        }
        .task-item-wrapper:hover {
            background: var(--bg-task-hover);
        }
        .task-item {
            padding: 12px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: default;
            flex-wrap: wrap;
        }
        .task-item .expand-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
            border-radius: 50%;
        }
        .task-item .expand-btn:active {
            background: rgba(0,0,0,0.05);
        }
        .task-item .expand-btn.expanded {
            transform: rotate(90deg);
        }
        .task-item .expand-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        .task-item .checkbox {
            width: 28px;
            height: 28px;
            background: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            border: 2px solid var(--text-muted);
            transition: all 0.2s;
        }
        .task-item .checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
        }
        .task-item .checkbox.checked svg {
            display: block;
        }
        .task-item .checkbox svg {
            width: 18px;
            height: 18px;
            fill: #fff;
            display: none;
        }
        .task-item .content-text {
            flex: 1;
            font-size: 15px;
            color: var(--text-primary);
            word-break: break-word;
            padding-bottom: 2px;
            border-bottom: 1.5px dashed var(--text-muted);
            cursor: text;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            min-width: 120px;
        }
        .task-item .content-text .task-label {
            flex: 1;
            min-width: 60px;
        }
        .task-item .content-text.completed {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .task-item .task-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            margin-left: auto;
        }
        .task-item .task-actions button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }
        .task-item .task-actions button:active {
            background: rgba(0,0,0,0.05);
        }
        .task-item .task-actions button:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .task-item .task-actions button.danger:hover {
            color: var(--danger);
        }
        .task-item .task-actions svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .task-step-badge {
            font-size: 11px;
            background: var(--accent);
            color: #fff;
            border-radius: 12px;
            padding: 0 10px;
            line-height: 20px;
            margin-left: 4px;
            flex-shrink: 0;
            opacity: 0.8;
            font-weight: 500;
        }

        /* ===== 子任务列表 ===== */
        .subtask-list {
            padding: 4px 12px 8px 48px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .subtask-list.hidden {
            display: none;
        }
        .subtask-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            border-radius: 4px;
            background: var(--bg-card);
            transition: background 0.15s;
        }
        .subtask-item:hover {
            background: var(--bg-task-hover);
        }
        .subtask-item .checkbox {
            width: 24px;
            height: 24px;
            background: var(--bg-primary);
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .subtask-item .checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
        }
        .subtask-item .checkbox.checked svg {
            display: block;
        }
        .subtask-item .checkbox svg {
            width: 16px;
            height: 16px;
            fill: #fff;
            display: none;
        }
        .subtask-item .subtask-text {
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
            word-break: break-word;
        }
        .subtask-item .subtask-text.completed {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .subtask-item .subtask-delete {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .subtask-item .subtask-delete:active {
            background: rgba(0,0,0,0.05);
        }
        .subtask-item .subtask-delete:hover {
            color: var(--danger);
        }
        .subtask-item .subtask-delete svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* ===== 添加步骤行 ===== */
        .add-subtask-row {
            display: flex;
            gap: 8px;
            padding: 6px 8px 6px 0;
            align-items: center;
        }
        .add-subtask-row input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            font-family: var(--font);
        }
        .add-subtask-row input:focus {
            border-color: var(--accent);
        }
        .add-subtask-row button {
            padding: 8px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: var(--font);
            transition: background 0.2s;
            white-space: nowrap;
        }
        .add-subtask-row button:active {
            background: var(--accent-hover);
        }

        /* ===== 添加任务行 ===== */
        .add-task-row {
            background: transparent;
            padding: 12px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 2px solid var(--bg-card);
        }
        .add-task-row .checkbox-placeholder {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            flex-shrink: 0;
        }
        .add-task-row input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            color: var(--text-primary);
            font-family: var(--font);
            padding: 6px 0;
        }
        .add-task-row input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }
        .add-task-row input:focus {
            border-bottom: 1.5px dashed var(--accent);
        }
        .add-task-row button {
            padding: 8px 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: var(--font);
            transition: background 0.2s;
            white-space: nowrap;
        }
        .add-task-row button:active {
            background: var(--accent-hover);
        }

        /* ===== 空状态 ===== */
        .empty-state {
            padding: 40px 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* ===== 滚动条 ===== */
        .todo-container::-webkit-scrollbar,
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .todo-container::-webkit-scrollbar-thumb,
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 4px;
        }
        .todo-container::-webkit-scrollbar-track,
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        /* ===== 模态弹窗（移动端底部浮层） ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding-bottom: 0;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-box {
            background: var(--bg-card);
            border-radius: 16px 16px 0 0;
            padding: 24px 24px calc(24px + var(--safe-bottom));
            max-width: 500px;
            width: 100%;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }
        .modal-box .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--text-muted);
            border-radius: 4px;
            margin: 0 auto 16px auto;
            opacity: 0.4;
        }
        .modal-box h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .modal-box label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .modal-box input[type="text"],
        .modal-box input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            font-family: var(--font);
            transition: border 0.2s;

            font-weight: 400;
            font-size: 15px;

            font-weight: 400;

        }
        .export-options .radio-group label input[type="radio"] {
            width: 18px;
            height: 18px;

        .export-options .option-hint {
            font-size: 13px;

            padding-left: 32px;

        .export-options .disabled-opts {
            opacity: 0.4;

        .export-options .group-name-display {
            font-weight: 600;

        /* ===== FAB (悬浮按钮) ===== */
        .fab-add-task {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;

            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;

        .fab-add-task:active {

        /* ===== 响应式：移动端 ===== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;

        @media (max-width: 480px) {
            .sidebar {
                width: 240px;

                padding: 12px 12px 10px 12px;

        /* 遮罩层（点击关闭侧边栏） */

</head>
<body>
    <!-- ===== 登录/注册界面 ===== -->

    <!-- ===== 主界面 ===== -->

                </div>
            </div>
            <div class="search-box">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" placeholder="搜索任务" id="searchInput" />

            <ul class="nav-list" id="groupList">
                <li class="bottom-action" id="addGroupBtn">
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    新建列表
                </li>

        <!-- 主内容 -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-left">

                <div class="header-actions">
                    <button id="importBtn" title="导入清单 (JSON)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />

                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />

                            <line x1="12" y1="15" x2="12" y2="3" />

                    <button id="helpBtn" title="查看语法帮助" onclick="window.open('syntax-help.html', '_blank')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                            <line x1="12" y1="17" x2="12.01" y2="17"></line>
                        </svg>
                    </button>
                    <button class="theme-toggle-btn" id="themeToggle" title="切换主题">
                        <svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    </button>
                    <button id="refreshBtn" title="手动同步">
                        <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4C7.58 4 4.01 7.58 4.01 12S7.58 20 12 20c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    </button>
                </div>
            </header>

            <div class="todo-container" id="todoContainer">
                <div class="filter-bar">
                    <div class="filter-label">
                        <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                        <span id="taskCount">0 项任务</span>
                    </div>
                    <div class="sync-status" id="syncStatus">已同步</div>
                </div>
                <div class="todo-list" id="todoList"></div>
                <!-- 悬浮添加按钮 -->
                <button class="fab-add-task" id="fabAddTask" title="添加任务">+</button>
            </div>
        </main>
    </div>

    <!-- ===== 模态弹窗 ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-handle"></div>
            <h3 id="modalTitle">编辑内容</h3>
            <div id="modalBody">
                <label for="modalInput">内容</label>
                <input type="text" id="modalInput" placeholder="输入内容..." />
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="modalCancel">取消</button>
                <button class="btn-confirm" id="modalConfirm">确认</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  STATE
        // ============================================================
        const STATE = {
            token: null,
            repoOwner: 's220515001',
            repoName: 'gittodo',
            dataFile: 'app_data.json',
            jsonbinTokenUrl: 'https://api.jsonbin.io/v3/b/6a296f88da38895dfea6e9b3',
            pollInterval: 5000,
            pollTimer: null,
            isSyncing: false,
            pendingSave: false,
            theme: 'light',
            expandedTasks: {},
            currentUser: null,
            users: {},
            todos: {},
            groups: [],
            currentGroupId: null,
        };

        // ============================================================
        //  DOM helpers
        // ============================================================
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        const appContainer = $('#appContainer');
        const loginOverlay = $('#loginOverlay');
        const loginUsername = $('#loginUsername');
        const loginPassword = $('#loginPassword');
        const loginError = $('#loginError');
        const loginBtn = $('#loginBtn');
        const registerBtn = $('#registerBtn');
        const switchModeLink = $('#switchModeLink');
        const loginTitle = $('#loginTitle');
        const loginSub = $('#loginSub');
        const switchHint = $('#switchHint');

        const sidebar = $('#sidebar');
        const sidebarOverlay = $('#sidebarOverlay');
        const menuToggle = $('#menuToggle');
        const closeSidebarBtn = $('#closeSidebarBtn');

        const groupList = $('#groupList');
        const todoList = $('#todoList');
        const currentGroupTitle = $('#currentGroupTitle');
        const taskCount = $('#taskCount');
        const syncStatus = $('#syncStatus');
        const themeToggle = $('#themeToggle');
        const refreshBtn = $('#refreshBtn');
        const searchInput = $('#searchInput');
        const avatarDisplay = $('#avatarDisplay');
        const usernameDisplay = $('#usernameDisplay');
        const logoutBtn = $('#logoutBtn');

        const exportWordBtn = $('#exportWordBtn');
        const exportJsonBtn = $('#exportJsonBtn');
        const importBtn = $('#importBtn');
        const fabAddTask = $('#fabAddTask');

        let isRegisterMode = false;

        function uuid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2,
            8); }

        function sortByOrder(arr) { arr.sort((a, b) => (a.order ?? 0) - (b.order ?? 0)); }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setSyncStatus(text) { syncStatus.textContent = text; }

        function encodePwd(pwd) { return btoa(pwd); }

        // ============================================================
        //  Sidebar 控制 (移动端)
        // ============================================================
        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        menuToggle.addEventListener('click', openSidebar);
        closeSidebarBtn.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);

        // ============================================================
        //  Modal
        // ============================================================
        const modalOverlay = $('#modalOverlay');
        const modalTitle = $('#modalTitle');
        const modalBody = $('#modalBody');
        const modalConfirm = $('#modalConfirm');
        const modalCancel = $('#modalCancel');
        let modalResolve = null;
        let modalMode = 'input';

        function showInputModal(title, defaultValue = '') {
            return new Promise((resolve) => {
                modalMode = 'input';
                modalTitle.textContent = title;
                modalBody.innerHTML =
                    `<label for="modalInput">内容</label><input type="text" id="modalInput" placeholder="输入内容..." value="${escapeHtml(defaultValue)}" />`;
                modalOverlay.classList.add('active');
                const inp = document.getElementById('modalInput');
                if (inp) { inp.focus();
                    inp.select(); }
                modalResolve = resolve;
                // 点击遮罩关闭
                modalOverlay._closeHandler = () => { closeModal(null); };
                modalOverlay.addEventListener('click', modalOverlay._closeHandler);
            });
        }

        function showExportModal(groupName) {
            return new Promise((resolve) => {
                modalMode = 'export';
                modalTitle.textContent = '📄 导出 Word 文档';
                modalBody.innerHTML = `
                        <div class="export-options">
                            <div style="margin-bottom:10px;font-size:14px;color:var(--text-secondary);">
                                当前列表：<span class="group-name-display">${escapeHtml(groupName)}</span>
                            </div>
                            <div class="option-group">
                                <label><input type="checkbox" id="exportIncludeSteps" checked /> 包含步骤</label>
                            </div>
                            <div class="option-group" id="stepFormatGroup">
                                <div class="radio-group">
                                    <label><input type="radio" name="stepFormat" value="line" checked /> 每步占一行</label>
                                    <label><input type="radio" name="stepFormat" value="inline" /> 空格隔开</label>
                                </div>
                                <div class="option-hint">步骤在任务下方缩进显示</div>
                            </div>
                        </div>
                    `;
                modalOverlay.classList.add('active');
                const chk = document.getElementById('exportIncludeSteps');
                const group = document.getElementById('stepFormatGroup');
                if (chk && group) {
                    chk.addEventListener('change', () => group.classList.toggle('disabled-opts', !chk.checked));
                    if (!chk.checked) group.classList.add('disabled-opts');
                }
                modalResolve = resolve;
                modalOverlay._closeHandler = () => { closeModal(null); };
                modalOverlay.addEventListener('click', modalOverlay._closeHandler);
            });
        }

        function closeModal(result) {
            modalOverlay.classList.remove('active');
            if (modalOverlay._closeHandler) {
                modalOverlay.removeEventListener('click', modalOverlay._closeHandler);
                delete modalOverlay._closeHandler;
            }
            if (modalResolve) { modalResolve(result);
                modalResolve = null; }
        }

        modalConfirm.addEventListener('click', () => {
            if (modalMode === 'input') {
                const inp = document.getElementById('modalInput');
                closeModal(inp ? inp.value.trim() : null);
            } else if (modalMode === 'export') {
                const chk = document.getElementById('exportIncludeSteps');
                const includeSteps = chk ? chk.checked : true;
                let stepFormat = 'line';
                document.querySelectorAll('input[name="stepFormat"]').forEach(r => { if (r.checked) stepFormat = r
                        .value; });
                closeModal({ includeSteps, stepFormat });
            }
        });
        modalCancel.addEventListener('click', () => closeModal(null));
        document.addEventListener('keydown', (e) => {
            if (!modalOverlay.classList.contains('active')) return;
            if (e.key === 'Enter') modalConfirm.click();
            else if (e.key === 'Escape') closeModal(null);
        });

        // ============================================================
        //  Theme
        // ============================================================
        function getPreferredTheme() {
            const stored = localStorage.getItem('gittodo-theme');
            return stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        }

        function applyTheme(theme) {
            STATE.theme = theme;
            document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
            localStorage.setItem('gittodo-theme', theme);
            const svg = themeToggle.querySelector('svg');
            if (theme === 'dark') {
                svg.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
            } else {
                svg.innerHTML =
                    '<path d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>';
            }
        }
        themeToggle.addEventListener('click', () => { applyTheme(STATE.theme === 'light' ? 'dark' : 'light'); });

        // ============================================================
        //  GitHub API
        // ============================================================
        async function fetchToken() {
            try {
                const resp = await fetch(STATE.jsonbinTokenUrl);
                if (!resp.ok) throw new Error('无法获取 Token');
                const data = await resp.json();
                const token = data.record?.github_token || data.record?.token || data.token;
                if (!token) throw new Error('Token 不存在');
                return token;
            } catch (e) {
                console.error('获取 Token 失败:', e);
                alert('请先配置 GitHub Token (在 jsonbin.io 中)');
                return null;
            }
        }

        function utf8ToBase64(str) {
            const encoder = new TextEncoder();
            const bytes = encoder.encode(str);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        function base64ToUtf8(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const decoder = new TextDecoder('utf-8');
            return decoder.decode(bytes);
        }

        async function fetchAppData() {
            if (!STATE.token) return null;
            try {
                const url =
                    `https://api.github.com/repos/${STATE.repoOwner}/${STATE.repoName}/contents/${STATE.dataFile}`;
                const resp = await fetch(url, {
                    headers: { 'Authorization': `token ${STATE.token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (resp.status === 404) return { users: {}, todos: {} };
                if (!resp.ok) throw new Error('获取数据失败');
                const data = await resp.json();
                const decoded = base64ToUtf8(data.content);
                return JSON.parse(decoded);
            } catch (e) { console.error('fetchAppData error:', e); return null; }
        }

        async function saveAppData(data) {
            if (!STATE.token) return false;
            try {
                const jsonStr = JSON.stringify(data, null, 2);
                const content = utf8ToBase64(jsonStr);
                const url =
                    `https://api.github.com/repos/${STATE.repoOwner}/${STATE.repoName}/contents/${STATE.dataFile}`;
                let currentSha = null;
                const infoResp = await fetch(url, {
                    headers: { 'Authorization': `token ${STATE.token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (infoResp.ok) { const info = await infoResp.json();
                    currentSha = info.sha; } else if (infoResp.status !== 404) { throw new Error(
                        `获取文件信息失败: ${infoResp.status}`); }
                const payload = { message: '更新 app_data', content, branch: 'main' };
                if (currentSha) payload.sha = currentSha;
                const resp = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${STATE.token}`, 'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!resp.ok) { const errText = await resp.text(); throw new Error(`保存失败: ${resp.status}`); }
                return true;
            } catch (e) { console.error('saveAppData error:', e); return false; }
        }

        // ============================================================
        //  同步
        // ============================================================
        async function pullFromGitHub() {
            if (STATE.isSyncing) return false;
            const fetched = await fetchAppData();
            if (fetched === null) return false;
            STATE.users = fetched.users || {};
            STATE.todos = fetched.todos || {};
            if (STATE.currentUser && STATE.todos[STATE.currentUser]) {
                STATE.groups = STATE.todos[STATE.currentUser].groups || [];
                sortByOrder(STATE.groups);
                if (!STATE.groups.some(g => g.id === STATE.currentGroupId)) {
                    STATE.currentGroupId = STATE.groups.length > 0 ? STATE.groups[0].id : null;
                }
                renderAll();
                setSyncStatus('已更新');
            } else { setSyncStatus('已同步'); }
            return true;
        }

        async function syncToGitHub() {
            if (STATE.isSyncing) { STATE.pendingSave = true; return; }
            STATE.isSyncing = true;
            setSyncStatus('同步中...');
            try {
                const fullData = { users: STATE.users, todos: STATE.todos };
                const ok = await saveAppData(fullData);
                if (ok) { setSyncStatus('已同步'); await pullFromGitHub(); } else { setSyncStatus('同步失败'); }
            } catch (e) { setSyncStatus('同步出错'); } finally {
                STATE.isSyncing = false;
                if (STATE.pendingSave) { STATE.pendingSave = false;
                    syncToGitHub(); }
            }
        }

        function saveAndSync() {
            if (STATE.currentUser) {
                if (!STATE.todos[STATE.currentUser]) STATE.todos[STATE.currentUser] = { groups: [] };
                STATE.todos[STATE.currentUser].groups = STATE.groups;
            }
            renderAll();
            syncToGitHub();
        }

        function startPolling() {
            if (STATE.pollTimer) clearInterval(STATE.pollTimer);
            STATE.pollTimer = setInterval(async () => {
                if (document.hidden || STATE.isSyncing) return;
                await pullFromGitHub();
            }, STATE.pollInterval);
        }

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && !STATE.isSyncing && STATE.currentUser) pullFromGitHub();
        });
        refreshBtn.addEventListener('click', () => { if (!STATE.isSyncing && STATE.currentUser) pullFromGitHub(); });

        // ============================================================
        //  格式化语法
        // ============================================================
        const TYPE_MAP = { 'P': '第{num}页', 'S': '第{num}步', 'Q': '第{num}课时', 'W': '第{num}周', 'T': '第{num}天', 'H': '第{num}小时',
            'U': '第{num}单元', '#': '{num}' };

        function parseRange(rangeStr) {
            rangeStr = rangeStr.trim();
            if (/^[\d\s,]+$/.test(rangeStr)) {
                const nums = rangeStr.split(',').map(s => parseInt(s.trim(), 10));
                if (nums.every(n => !isNaN(n) && n > 0)) return nums;
                return null;
            }
            const match = rangeStr.match(/^(\d+)\s*-\s*(\d+)(?:\s*:\s*(\d+))?$/);
            if (match) {
                const start = parseInt(match[1], 10),
                    end = parseInt(match[2], 10),
                    step = match[3] ? parseInt(match[3], 10) : 1;
                if (isNaN(start) || isNaN(end) || isNaN(step) || step < 1) return null;
                const result = [];
                if (start <= end) { for (let i = start; i <= end; i += step) result.push(i); } else { for (let i =
                        start; i >= end; i -= step) result.push(i); }
                return result;
            }
            return null;
        }

        function parseBlock(blockContent) {
            blockContent = blockContent.trim();
            if (blockContent.includes('&')) {
                const parts = blockContent.split('&').map(s => s.trim());
                const dimensions = [];
                for (const part of parts) {
                    const match = part.match(/^([A-Z#])(.+?)(?:\|(.+))?$/);
                    if (!match) return null;
                    const type = match[1],
                        rangeStr = match[2].trim(),
                        template = match[3] ? match[3].trim() : null;
                    if (!TYPE_MAP[type]) return null;
                    const nums = parseRange(rangeStr);
                    if (!nums) return null;
                    dimensions.push({ type, nums, template: template || TYPE_MAP[type] });
                }
                const minLen = Math.min(...dimensions.map(d => d.nums.length));
                if (minLen === 0) return null;
                return { type: 'pair', dimensions, length: minLen };
            } else {
                const match = blockContent.match(/^([A-Z#])(.+?)(?:\|(.+))?$/);
                if (!match) return null;
                const type = match[1],
                    rangeStr = match[2].trim(),
                    template = match[3] ? match[3].trim() : null;
                if (!TYPE_MAP[type]) return null;
                const nums = parseRange(rangeStr);
                if (!nums) return null;
                return { type: 'single', nums, template: template || TYPE_MAP[type] };
            }
        }

        function expandBlock(block) {
            if (block.type === 'single') return block.nums.map(num => block.template.replace(/\{num\}/g, num));
            else if (block.type === 'pair') {
                const dims = block.dimensions,
                    len = block.length,
                    results = [];
                for (let i = 0; i < len; i++) {
                    results.push(dims.map(d => d.template.replace(/\{num\}/g, d.nums[i])).join(' '));
                }
                return results;
            }
            return [];
        }

        function parseStepName(input) {
            const escaped = input.replace(/%%/g, '\uFFFF');
            const regex = /%([^%]+?)%/g;
            let match,
                lastIndex = 0,
                blocks = [],
                textParts = [],
                hasBlock = false;
            while ((match = regex.exec(escaped)) !== null) {
                hasBlock = true;
                const before = escaped.substring(lastIndex, match.index);
                if (before) textParts.push(before);
                const content = match[1];
                const parsed = parseBlock(content);
                if (!parsed) return null;
                blocks.push(parsed);
                lastIndex = match.index + match[0].length;
            }
            if (lastIndex < escaped.length) { const remaining = escaped.substring(lastIndex); if (remaining) textParts.push(
                    remaining); }
            if (!hasBlock) return { displayName: input, steps: [] };
            const displayName = textParts.join('').replace(/\uFFFF/g, '%');
            let allSteps = [];
            for (const block of blocks) { allSteps = allSteps.concat(expandBlock(block)); }
            return { displayName: displayName || '', steps: allSteps };
        }

        // ============================================================
        //  渲染
        // ============================================================
        function renderAll() {
            renderSidebar();
            renderTasks();
        }

        function renderSidebar() {
            if (STATE.currentUser) {
                avatarDisplay.textContent = STATE.currentUser.charAt(0).toUpperCase();
                usernameDisplay.textContent = STATE.currentUser;
            }
            const items = groupList.querySelectorAll('li[data-group-id]');
            items.forEach(el => el.remove());
            const bottomAction = groupList.querySelector('.bottom-action');
            STATE.groups.forEach(g => {
                const li = document.createElement('li');
                li.dataset.groupId = g.id;
                if (g.id === STATE.currentGroupId) li.classList.add('active');
                li.innerHTML =
                    `<svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg><span class="group-name">${escapeHtml(g.name)}</span><span class="group-delete" data-group-id="${g.id}" title="删除列表">✕</span>`;
                groupList.insertBefore(li, bottomAction);

            groupList.querySelectorAll('li[data-group-id]').forEach(li => {
                li.addEventListener('click', (e) => {

            groupList.querySelectorAll('.group-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const gid = btn.dataset.groupId;
                    if (confirm('确定删除此任务组吗？')) {
                        STATE.groups = STATE.groups.filter(g => g.id !== gid);
                        if (STATE.currentGroupId === gid) {
                            STATE.currentGroupId = STATE.groups.length > 0 ? STATE.groups[0].id : null;
                        }

                    }
                });
            });
            const addBtn = groupList.querySelector('.bottom-action');
            addBtn.removeEventListener('click', handleAddGroup);

        function renderTasks() {
            const group = STATE.groups.find(g => g.id === STATE.currentGroupId);
            if (!group) {
                todoList.innerHTML = `<div class="empty-state"><p>选择一个任务组或创建新列表</p></div>`;
                currentGroupTitle.textContent = '任务';
                taskCount.textContent = '0 项任务';
                return;
            }
            currentGroupTitle.textContent = group.name;
            const tasks = group.tasks || [];
            sortByOrder(tasks);
            taskCount.textContent = `${tasks.length} 项任务`;
            if (tasks.length === 0) {
                todoList.innerHTML =
                    `<div class="empty-state"><p>还没有任务，添加一个吧</p></div>${renderAddTaskRow(group.id)}`;
                return;
            }
            let html = '';
            tasks.forEach(task => {
                const isExpanded = STATE.expandedTasks[task.id] || false;
                const subtasks = task.subtasks || [];
                sortByOrder(subtasks);
                const checked = task.completed ? 'checked' : '';
                const completedClass = task.completed ? 'completed' : '';
                const stepCount = subtasks.length;
                const badgeHtml = stepCount > 0 ? `<span class="task-step-badge">${stepCount}</span>` : '';
                html += `
                        <div class="task-item-wrapper" data-task-id="${task.id}">
                            <div class="task-item">
                                <button class="expand-btn ${isExpanded ? 'expanded' : ''}" data-task-id="${task.id}" title="展开/收起步骤">
                                    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                                </button>
                                <div class="checkbox ${checked}" data-task-id="${task.id}">
                                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                                </div>
                                <div class="content-text ${completedClass}" data-task-id="${task.id}">
                                    <span class="task-label">${escapeHtml(task.content)}</span>
                                    ${badgeHtml}
                                </div>
                                <div class="task-actions">
                                    <button class="add-subtask-btn" data-task-id="${task.id}" title="添加步骤">
                                        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                                    </button>
                                    <button class="edit-task-btn" data-task-id="${task.id}" title="编辑">
                                        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                    </button>
                                    <button class="danger delete-task-btn" data-task-id="${task.id}" title="删除">
                                        <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="subtask-list ${isExpanded ? '' : 'hidden'}" data-task-id="${task.id}">
                                ${subtasks.map(st => {
                                    const stChecked = st.completed ? 'checked' : '';
                                    const stCompletedClass = st.completed ? 'completed' : '';
                                    return `
                                            <div class="subtask-item" data-subtask-id="${st.id}">
                                                <div class="checkbox ${stChecked}" data-subtask-id="${st.id}">
                                                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                                                </div>
                                                <span class="subtask-text ${stCompletedClass}">${escapeHtml(st.content)}</span>
                                                <button class="subtask-delete" data-subtask-id="${st.id}" title="删除步骤">
                                                    <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
                                                </button>
                                            </div>
                                        `;
                                }).join('')}
                                <div class="add-subtask-row" data-task-id="${task.id}">
                                    <input type="text" class="add-subtask-input" placeholder="添加步骤… 支持 %P1-3% 语法" />
                                    <button class="add-subtask-confirm" data-task-id="${task.id}">添加</button>
                                </div>
                            </div>
                        </div>
                    `;
            });
            html += renderAddTaskRow(group.id);
            todoList.innerHTML = html;
        }

        function renderAddTaskRow(groupId) {
            return `
                    <div class="add-task-row" data-group-id="${groupId}">
                        <div class="checkbox-placeholder"></div>
                        <input type="text" class="add-task-input" placeholder="添加任务… 支持 %P1-3% 自动生成步骤" />
                        <button class="add-task-confirm" data-group-id="${groupId}">添加</button>
                    </div>
                `;
        }

        // ============================================================
        //  事件绑定
        // ============================================================
        todoList.addEventListener('click', async (e) => {
            const target = e.target.closest('button') || e.target;

            if (target.classList && target.classList.contains('expand-btn')) {
                const taskId = target.dataset.taskId;
                STATE.expandedTasks[taskId] = !STATE.expandedTasks[taskId];
                renderTasks();
                return;
            }

            if (target.classList && target.classList.contains('checkbox') && target.closest('.task-item')) {
                const taskId = target.dataset.taskId;
                const group = getCurrentGroup();
                if (!group) return;
                const task = group.tasks.find(t => t.id === taskId);
                if (!task) return;
                const newCompleted = !task.completed;
                task.completed = newCompleted;
                task.completedAt = newCompleted ? Date.now() : null;
                if (newCompleted && task.subtasks) task.subtasks.forEach(st => { st.completed = true; });
                saveAndSync();
                return;
            }

            if (target.classList && target.classList.contains('checkbox') && target.closest('.subtask-item')) {
                const subtaskId = target.dataset.subtaskId;
                const group = getCurrentGroup();
                if (!group) return;
                let foundTask = null,
                    foundSubtask = null;
                for (const task of group.tasks) {
                    const st = (task.subtasks || []).find(s => s.id === subtaskId);
                    if (st) { foundTask = task;
                        foundSubtask = st; break; }
                }
                if (!foundTask || !foundSubtask) return;
                foundSubtask.completed = !foundSubtask.completed;
                if (!foundSubtask.completed && foundTask.completed) {
                    foundTask.completed = false;
                    foundTask.completedAt = null;
                }
                if (foundSubtask.completed) {
                    const allCompleted = (foundTask.subtasks || []).every(s => s.completed === true);
                    if (allCompleted && !foundTask.completed) {
                        foundTask.completed = true;
                        foundTask.completedAt = Date.now();
                    }
                }
                saveAndSync();
                return;
            }

            if (target.classList && target.classList.contains('edit-task-btn')) {
                const taskId = target.dataset.taskId;
                const group = getCurrentGroup();
                if (!group) return;
                const task = group.tasks.find(t => t.id === taskId);
                if (!task) return;
                const result = await showInputModal('编辑任务内容', task.content);
                if (result !== null && result !== '') { task.content = result;
                    saveAndSync(); }
                return;
            }

            if (target.classList && target.classList.contains('delete-task-btn')) {
                const taskId = target.dataset.taskId;
                if (!confirm('确定删除此任务吗？')) return;
                const group = getCurrentGroup();
                if (!group) return;
                group.tasks = group.tasks.filter(t => t.id !== taskId);
                saveAndSync();
                return;
            }

            if (target.classList && target.classList.contains('add-subtask-btn')) {
                const taskId = target.dataset.taskId;
                STATE.expandedTasks[taskId] = true;
                renderTasks();
                const result = await showInputModal('添加步骤', '');
                if (result !== null && result !== '') {
                    const parsed = parseStepName(result);
                    const group = getCurrentGroup();
                    if (!group) { alert('当前组未找到'); return; }
                    const task = group.tasks.find(t => t.id === taskId);
                    if (!task) { alert('任务未找到'); return; }
                    if (!task.subtasks) task.subtasks = [];
                    if (parsed && parsed.steps.length > 0) {
                        const newSubtasks = parsed.steps.map((stepText, idx) => ({
                            id: uuid(),
                            content: stepText,
                            completed: false,
                            order: task.subtasks.length + idx,
                        }));
                        task.subtasks.push(...newSubtasks);
                    } else {
                        const content = (parsed && parsed.displayName) || result;
                        task.subtasks.push({ id: uuid(), content, completed: false, order: task.subtasks.length });
                    }
                    saveAndSync();
                }
                return;
            }

            if (target.classList && target.classList.contains('add-subtask-confirm')) {
                const taskId = target.dataset.taskId;
                const row = target.closest('.add-subtask-row');
                if (!row) return;
                const input = row.querySelector('.add-subtask-input');
                if (!input) return;
                const text = input.value.trim();
                if (!text) return;
                const group = getCurrentGroup();
                if (!group) return;
                const task = group.tasks.find(t => t.id === taskId);
                if (!task) return;
                const parsed = parseStepName(text);
                if (!task.subtasks) task.subtasks = [];
                if (parsed && parsed.steps.length > 0) {
                    const newSubtasks = parsed.steps.map((stepText, idx) => ({
                        id: uuid(),
                        content: stepText,
                        completed: false,
                        order: task.subtasks.length + idx,
                    }));
                    task.subtasks.push(...newSubtasks);
                } else {
                    const content = (parsed && parsed.displayName) || text;
                    task.subtasks.push({ id: uuid(), content, completed: false, order: task.subtasks.length });
                }
                input.value = '';
                saveAndSync();
                return;
            }

            if (target.classList && target.classList.contains('subtask-delete')) {
                const subtaskId = target.dataset.subtaskId;
                if (!confirm('删除此步骤吗？')) return;
                const group = getCurrentGroup();
                if (!group) return;
                for (const task of group.tasks) {
                    const idx = (task.subtasks || []).findIndex(s => s.id === subtaskId);
                    if (idx !== -1) { task.subtasks.splice(idx, 1);
                        saveAndSync(); return; }
                }
                return;
            }

            if (target.classList && target.classList.contains('add-task-confirm')) {
                const groupId = target.dataset.groupId;
                const row = target.closest('.add-task-row');
                if (!row) return;
                const input = row.querySelector('.add-task-input');
                if (!input) return;
                const text = input.value.trim();
                if (!text) return;
                const group = STATE.groups.find(g => g.id === groupId);
                if (!group) return;
                const parsed = parseStepName(text);
                let taskName = text,
                    steps = [];
                if (parsed) { taskName = parsed.displayName || text;
                    steps = parsed.steps || []; }
                const newTask = {
                    id: uuid(),
                    content: taskName,
                    completed: false,
                    order: group.tasks.length,
                    createdAt: Date.now(),
                    completedAt: null,
                    subtasks: steps.map((stepText, idx) => ({ id: uuid(), content: stepText, completed: false,
                        order: idx })),
                };
                group.tasks.push(newTask);
                if (steps.length > 0) STATE.expandedTasks[newTask.id] = true;
                input.value = '';
                saveAndSync();
                return;
            }
        });

        todoList.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const target = e.target;
                if (target.classList && target.classList.contains('add-subtask-input')) {
                    const row = target.closest('.add-subtask-row');
                    if (!row) return;
                    const btn = row.querySelector('.add-subtask-confirm');

                } else if (target.classList && target.classList.contains('add-task-input')) {
                    const row = target.closest('.add-task-row');
                    if (!row) return;
                    const btn = row.querySelector('.add-task-confirm');
                    if (btn) btn.click();
                }
            }
        });

        todoList.addEventListener('dblclick', async (e) => {
            const target = e.target.closest('.content-text');
            if (!target) return;
            const taskId = target.dataset.taskId;
            const group = getCurrentGroup();
            if (!group) return;
            const task = group.tasks.find(t => t.id === taskId);
            if (!task) return;
            const result = await showInputModal('编辑任务内容', task.content);
            if (result !== null && result !== '') { task.content = result;
                saveAndSync(); }
        });

        // FAB 添加任务
        fabAddTask.addEventListener('click', async () => {
            const group = getCurrentGroup();
            if (!group) { alert('请先选择一个任务组'); return; }
            const result = await showInputModal('添加新任务', '');
            if (result !== null && result !== '') {
                const parsed = parseStepName(result);
                let taskName = result,
                    steps = [];
                if (parsed) { taskName = parsed.displayName || result;
                    steps = parsed.steps || []; }
                const newTask = {
                    id: uuid(),
                    content: taskName,
                    completed: false,
                    order: group.tasks.length,
                    createdAt: Date.now(),

                saveAndSync();
            }
