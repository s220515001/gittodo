<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>GitTodo · 任务管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js">
    </script>
    <style>
        /* ===== 基础样式重置 & 变量 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }
        :root {
            --bg-primary: #f3f4f6;
            --bg-sidebar: #f3f4f6;
            --bg-main: #254e68;
            --bg-card: #f0f3f5;
            --bg-task: #e7ebee;
            --bg-task-hover: #dce1e6;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --radius: 8px;
            --accent: #3a7cae;
            --accent-hover: #2c5f8a;
            --danger: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --overdue-color: #e74c3c;
            --due-soon-color: #f39c12;
        }
        [data-theme="dark"] {
            --bg-primary: #1e1e1e;
            --bg-sidebar: #2d2d2d;
            --bg-main: #1a1a2e;
            --bg-card: #2d2d3d;
            --bg-task: #3a3a4a;
            --bg-task-hover: #4a4a5a;
            --text-primary: #e6edf3;
            --text-secondary: #b0c4de;
            --text-muted: #7a8a9a;
            --border-color: #404050;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --overdue-color: #ff6b6b;
            --due-soon-color: #feca57;
        }
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        /* ===== 登录界面 ===== */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.4s ease;
            padding: 20px;
        }
        #loginOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .login-box {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        .login-box h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .login-box p.sub {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .login-box .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .login-box .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .login-box .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            font-family: var(--font);
            transition: border 0.2s;
            -webkit-appearance: none;
        }
        .login-box .form-group input:focus {
            border-color: var(--accent);
        }
        .login-box .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .login-box .actions button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            font-family: var(--font);
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-box .actions .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .login-box .actions .btn-primary:hover {
            background: var(--accent-hover);
        }
        .login-box .actions .btn-secondary {
            background: var(--bg-task);
            color: var(--text-secondary);
        }
        .login-box .actions .btn-secondary:hover {
            background: var(--bg-task-hover);
        }
        .login-box .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }
        .login-box .switch-mode {
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .login-box .switch-mode a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        .login-box .switch-mode a:hover {
            text-decoration: underline;
        }

        /* ===== 主界面布局 ===== */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 0 10px 0;
            flex-shrink: 0;
            overflow-y: auto;
            transition: transform 0.3s ease, background 0.2s, border 0.2s;
            z-index: 1000;
        }
        .sidebar .close-sidebar {
            display: none;
            align-self: flex-end;
            margin: 0 16px 12px 0;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }
        .profile-section {
            padding: 0 24px 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .profile-avatar {
            width: 44px;
            height: 44px;
            background-color: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .profile-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }
        .profile-info .name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .profile-info .email {
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
        }
        .profile-info .email:hover {
            color: var(--danger);
        }
        .search-box {
            margin: 0 16px 16px 16px;
            padding: 8px 12px;
            background: var(--bg-primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .search-box:hover,
        .search-box:focus-within {
            border-color: var(--accent);
        }
        .search-box svg {
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
            margin-right: 8px;
        }
        .search-box input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 13px;
            color: var(--text-primary);
        }
        .nav-list {
            flex: 1;
            margin: 0 16px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto;
        }
        .nav-list li {
            padding: 10px 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.15s;
        }
        .nav-list li:hover {
            background: var(--bg-task-hover);
        }
        .nav-list li.active {
            background: var(--bg-task);
            font-weight: 500;
            color: var(--accent);
        }
        .nav-list li svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            flex-shrink: 0;
        }
        .nav-list li .group-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nav-list .group-delete {
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
        }
        .nav-list li:hover .group-delete {
            opacity: 1;
        }
        .nav-list .group-delete:hover {
            color: var(--danger);
        }
        .nav-list .nav-divider {
            border-top: 1px solid var(--border-color);
            margin: 6px 0;
            padding: 0 !important;
            cursor: default !important;
            background: none !important;
            height: 0;
        }
        .nav-list .nav-divider:hover {
            background: none !important;
        }
        .nav-list .nav-view-item {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .nav-list .nav-view-item.active {
            color: var(--accent);
            background: var(--bg-task);
        }
        .nav-list .nav-view-item svg {
            width: 16px;
            height: 16px;
        }
        .nav-list .bottom-action {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .nav-list .bottom-action:hover {
            background: transparent;
            color: var(--accent);
        }

        /* ===== 主内容区 ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            overflow: hidden;
            transition: background 0.2s;
            position: relative;
        }
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 12px 20px;
            color: #fff;
            min-height: 64px;
        }
        .content-header .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .content-header .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
            padding: 4px 8px;
        }
        .content-header h1 {
            font-size: 20px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .header-actions button {
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-actions button:hover {
            opacity: 1;
        }
        .header-actions svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            stroke: currentColor;
            stroke-width: 1.5;
        }

        /* ===== 任务容器 ===== */
        .todo-container {
            flex: 1;
            background: var(--bg-card);
            margin: 0 16px 16px 16px;
            border-radius: 8px;
            overflow-y: auto;
            padding: 16px 0 10px 0;
            box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.1);
            transition: background 0.2s;
            position: relative;
        }
        .filter-bar {
            padding: 0 16px 8px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }
        .filter-bar .filter-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-bar .filter-label svg {
            width: 14px;
            height: 14px;
            fill: var(--text-secondary);
        }
        .filter-bar .sync-status {
            font-size: 12px;
            color: var(--text-muted);
        }
        .todo-list {
            padding: 12px 16px 0 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ===== 任务卡片 ===== */
        .task-item-wrapper {
            background: var(--bg-task);
            border-radius: 6px;
            border-top: 2px solid var(--bg-card);
            border-bottom: 2px solid var(--bg-card);
            transition: background 0.15s;
            position: relative;
        }
        .task-item-wrapper:hover {
            background: var(--bg-task-hover);
        }
        .task-item-wrapper.overdue {
            border-left: 4px solid var(--overdue-color);
            border-right: 4px solid var(--overdue-color);
        }
        .task-item-wrapper.due-soon {
            border-left: 4px solid var(--due-soon-color);
            border-right: 4px solid var(--due-soon-color);
        }
        .task-item {
            padding: 12px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: default;
            flex-wrap: wrap;
        }
        .task-item .drag-handle {
            cursor: grab;
            color: var(--text-muted);
            padding: 4px;
            opacity: 0.4;
            transition: opacity 0.2s;
            user-select: none;
            font-size: 18px;
            letter-spacing: -2px;
            line-height: 1;
        }
        .task-item-wrapper:hover .drag-handle {
            opacity: 0.8;
        }
        .task-item .expand-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
            border-radius: 50%;
        }
        .task-item .expand-btn:active {
            background: rgba(0, 0, 0, 0.05);
        }
        .task-item .expand-btn.expanded {
            transform: rotate(90deg);
        }
        .task-item .expand-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        .task-item .checkbox {
            width: 28px;
            height: 28px;
            background: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            border: 2px solid var(--text-muted);
            transition: all 0.2s;
        }
        .task-item .checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
        }
        .task-item .checkbox.checked svg {
            display: block;
        }
        .task-item .checkbox svg {
            width: 18px;
            height: 18px;
            fill: #fff;
            display: none;
        }
        .task-item .content-area {
            flex: 1;
            min-width: 120px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .task-item .content-text {
            font-size: 15px;
            color: var(--text-primary);
            word-break: break-word;
            border-bottom: 1.5px dashed var(--text-muted);
            cursor: text;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            padding-bottom: 2px;
        }
        .task-item .content-text .task-label {
            flex: 1;
            min-width: 60px;
        }
        .task-item .content-text.completed {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .task-item .task-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            font-size: 12px;
            color: var(--text-muted);
            padding-left: 2px;
        }
        .task-item .task-meta .due-date {
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
        }
        .task-item .task-meta .due-date.overdue {
            color: var(--overdue-color);
            border-color: var(--overdue-color);
            background: rgba(231, 76, 60, 0.1);
        }
        .task-item .task-meta .due-date.due-soon {
            color: var(--due-soon-color);
            border-color: var(--due-soon-color);
            background: rgba(243, 156, 18, 0.1);
        }
        .task-item .task-meta .tag-pill {
            display: inline-block;
            font-size: 10px;
            padding: 0 8px;
            border-radius: 10px;
            line-height: 18px;
            font-weight: 500;
            color: #fff;
            background: var(--accent);
            margin-right: 2px;
        }
        .task-item .task-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            margin-left: auto;
        }
        .task-item .task-actions button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }
        .task-item .task-actions button:active {
            background: rgba(0, 0, 0, 0.05);
        }
        .task-item .task-actions button:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .task-item .task-actions button.danger:hover {
            color: var(--danger);
        }
        .task-item .task-actions svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .task-step-badge {
            font-size: 11px;
            background: var(--accent);
            color: #fff;
            border-radius: 12px;
            padding: 0 10px;
            line-height: 20px;
            margin-left: 4px;
            flex-shrink: 0;
            opacity: 0.8;
            font-weight: 500;
        }

        /* ===== 子任务列表 ===== */
        .subtask-list {
            padding: 4px 12px 8px 48px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .subtask-list.hidden {
            display: none;
        }
        .subtask-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            border-radius: 4px;
            background: var(--bg-card);
            transition: background 0.15s;
        }
        .subtask-item:hover {
            background: var(--bg-task-hover);
        }
        .subtask-item .checkbox {
            width: 24px;
            height: 24px;
            background: var(--bg-primary);
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .subtask-item .checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
        }
        .subtask-item .checkbox.checked svg {
            display: block;
        }
        .subtask-item .checkbox svg {
            width: 16px;
            height: 16px;
            fill: #fff;
            display: none;
        }
        .subtask-item .subtask-text {
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
            word-break: break-word;
        }
        .subtask-item .subtask-text.completed {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .subtask-item .subtask-delete {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .subtask-item .subtask-delete:active {
            background: rgba(0, 0, 0, 0.05);
        }
        .subtask-item .subtask-delete:hover {
            color: var(--danger);
        }
        .subtask-item .subtask-delete svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* ===== 任务备注 ===== */
        .task-notes-area {
            padding: 4px 12px 8px 48px;
        }
        .task-notes-area textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font);
            resize: vertical;
            min-height: 50px;
            transition: border 0.2s;
        }
        .task-notes-area textarea:focus {
            border-color: var(--accent);
        }
        .task-notes-area .notes-label {
            font-size: 11px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 2px;
        }

        /* ===== 添加步骤行 ===== */
        .add-subtask-row {
            display: flex;
            gap: 8px;
            padding: 6px 8px 6px 0;
            align-items: center;
        }
        .add-subtask-row input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            font-family: var(--font);
        }
        .add-subtask-row input:focus {
            border-color: var(--accent);
        }
        .add-subtask-row button {
            padding: 8px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: var(--font);
            transition: background 0.2s;
            white-space: nowrap;
        }
        .add-subtask-row button:active {
            background: var(--accent-hover);
        }

        /* ===== 添加任务行 ===== */
        .add-task-row {
            background: transparent;
            padding: 12px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 2px solid var(--bg-card);
        }
        .add-task-row .checkbox-placeholder {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            flex-shrink: 0;
        }
        .add-task-row input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            color: var(--text-primary);
            font-family: var(--font);
            padding: 6px 0;
        }
        .add-task-row input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }
        .add-task-row input:focus {
            border-bottom: 1.5px dashed var(--accent);
        }
        .add-task-row button {
            padding: 8px 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: var(--font);
            transition: background 0.2s;
            white-space: nowrap;
        }
        .add-task-row button:active {
            background: var(--accent-hover);
        }

        /* ===== 空状态 ===== */
        .empty-state {
            padding: 40px 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* ===== 滚动条 ===== */
        .todo-container::-webkit-scrollbar,
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .todo-container::-webkit-scrollbar-thumb,
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 4px;
        }
        .todo-container::-webkit-scrollbar-track,
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        /* ===== 模态弹窗 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding-bottom: 0;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-box {
            background: var(--bg-card);
            border-radius: 16px 16px 0 0;
            padding: 24px 24px calc(24px + var(--safe-bottom));
            max-width: 500px;
            width: 100%;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }
        .modal-box .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--text-muted);
            border-radius: 4px;
            margin: 0 auto 16px auto;
            opacity: 0.4;
        }
        .modal-box h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        .modal-box label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .modal-box input[type="text"],
        .modal-box input[type="password"],
        .modal-box input[type="date"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            font-family: var(--font);
            transition: border 0.2s;
            -webkit-appearance: none;
        }
        .modal-box input[type="text"]:focus,
        .modal-box input[type="password"]:focus,
        .modal-box input[type="date"]:focus {
            border-color: var(--accent);
        }
        .modal-box textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 15px;
            font-family: var(--font);
            transition: border 0.2s;
            resize: vertical;
            min-height: 80px;
        }
        .modal-box textarea:focus {
            border-color: var(--accent);
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 18px;
        }
        .modal-actions button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-family: var(--font);
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal-actions .btn-cancel {
            background: var(--bg-task);
            color: var(--text-secondary);
        }
        .modal-actions .btn-cancel:hover {
            background: var(--bg-task-hover);
        }
        .modal-actions .btn-confirm {
            background: var(--accent);
            color: #fff;
        }
        .modal-actions .btn-confirm:hover {
            background: var(--accent-hover);
        }
        .modal-box .form-row {
            margin-bottom: 12px;
        }
        .modal-box .form-row:last-child {
            margin-bottom: 0;
        }

        /* ===== 统计看板 ===== */
        .stats-dashboard {
            padding: 16px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stats-card {
            background: var(--bg-task);
            border-radius: 8px;
            padding: 14px 12px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .stats-card .stats-number {
            font-size: 26px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .stats-card .stats-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .stats-card .stats-number.overdue {
            color: var(--overdue-color);
        }
        .stats-card .stats-number.due-soon {
            color: var(--due-soon-color);
        }
        .stats-card .stats-number.success {
            color: var(--success);
        }
        .stats-chart-wrap {
            padding: 0 20px 20px 20px;
            max-width: 350px;
            margin: 0 auto;
        }
        .stats-chart-wrap canvas {
            width: 100% !important;
            height: auto !important;
        }
        .stats-group-name {
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            padding: 8px 0 4px 0;
        }
        .stats-empty {
            padding: 40px 16px;
            text-align: center;
            color: var(--text-muted);
        }

        /* ===== 日历视图 ===== */
        .calendar-view {
            padding: 12px 16px;
        }
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .calendar-header .cal-nav {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .calendar-header .cal-nav:hover {
            background: var(--bg-task-hover);
        }
        .calendar-header .cal-title {
            font-size: 16px;
            font-weight: 500;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }
        .calendar-grid .cal-day-header {
            background: var(--bg-card);
            padding: 8px 4px;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .calendar-grid .cal-cell {
            background: var(--bg-card);
            min-height: 70px;
            padding: 6px 4px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        .calendar-grid .cal-cell:hover {
            background: var(--bg-task-hover);
        }
        .calendar-grid .cal-cell .cal-day-num {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .calendar-grid .cal-cell .cal-day-num.other-month {
            color: var(--text-muted);
            opacity: 0.5;
        }
        .calendar-grid .cal-cell .cal-dot {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            margin-top: 4px;
        }
        .calendar-grid .cal-cell .cal-dot .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }
        .calendar-grid .cal-cell .cal-dot .dot.completed {
            background: var(--success);
        }
        .calendar-grid .cal-cell .cal-dot .dot.overdue {
            background: var(--overdue-color);
        }
        .calendar-grid .cal-cell .cal-count {
            font-size: 10px;
            color: var(--text-muted);
            position: absolute;
            bottom: 4px;
            right: 6px;
        }
        .calendar-grid .cal-cell.today {
            outline: 2px solid var(--accent);
            outline-offset: -2px;
        }
        .calendar-grid .cal-cell.selected {
            background: var(--bg-task);
            outline: 2px solid var(--accent);
        }

        .calendar-day-tasks {
            margin-top: 16px;
            background: var(--bg-task);
            border-radius: 8px;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
        }
        .calendar-day-tasks .cdt-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }
        .calendar-day-tasks .cdt-task {
            padding: 4px 0;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .calendar-day-tasks .cdt-task:last-child {
            border-bottom: none;
        }
        .calendar-day-tasks .cdt-task .cdt-done {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .calendar-day-tasks .cdt-empty {
            color: var(--text-muted);
            font-size: 13px;
            padding: 8px 0;
        }

        /* ===== 视图切换 ===== */
        .view-content {
            display: none;
            height: 100%;
            overflow-y: auto;
        }
        .view-content.active {
            display: block;
        }

        /* ===== 批量操作栏 ===== */
        .batch-bar {
            display: none;
            padding: 8px 16px;
            background: var(--bg-task);
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .batch-bar.active {
            display: flex;
        }
        .batch-bar .batch-info {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .batch-bar button {
            padding: 4px 12px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            font-family: var(--font);
            background: var(--accent);
            color: #fff;
            transition: background 0.2s;
        }
        .batch-bar button.danger {
            background: var(--danger);
        }
        .batch-bar button:hover {
            opacity: 0.85;
        }

        /* ===== 导出选项 ===== */
        .export-options {
            margin: 12px 0 6px 0;
        }
        .export-options .option-group {
            margin-bottom: 12px;
        }
        .export-options .option-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
            font-size: 15px;
            color: var(--text-primary);
            cursor: pointer;
            margin-bottom: 2px;
        }
        .export-options .option-group label input[type="checkbox"],
        .export-options .option-group label input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .export-options .radio-group {
            padding-left: 32px;
            margin-top: 4px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .export-options .radio-group label {
            font-weight: 400;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 0;
        }
        .export-options .radio-group label input[type="radio"] {
            width: 18px;
            height: 18px;
        }
        .export-options .option-hint {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
            padding-left: 32px;
        }
        .export-options .disabled-opts {
            opacity: 0.4;
            pointer-events: none;
        }
        .export-options .group-name-display {
            font-weight: 600;
            color: var(--accent);
        }

        /* ===== 随机任务高亮 ===== */
        .task-item-wrapper.random-highlight {
            animation: randomPulse 0.8s ease 3;
            border-color: var(--accent) !important;
            box-shadow: 0 0 20px rgba(58, 124, 174, 0.3);
        }
        @keyframes randomPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
                background: var(--bg-task-hover);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 280px;
                transform: translateX(-100%);
                border-right: 1px solid var(--border-color);
                box-shadow: 2px 0 20px rgba(0, 0, 0, 0.15);
                z-index: 2000;
                background: var(--bg-sidebar);
                padding-top: 12px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar .close-sidebar {
                display: block;
            }
            .content-header .menu-toggle {
                display: block;
            }
            .content-header h1 {
                max-width: 120px;
                font-size: 18px;
            }
            .todo-container {
                margin: 0 12px 12px 12px;
                padding: 12px 0 10px 0;
            }
            .todo-list {
                padding: 8px 10px 0 10px;
            }
            .task-item {
                padding: 10px 8px;
                gap: 8px;
            }
            .task-item .content-text {
                font-size: 14px;
                min-width: 80px;
            }
            .task-item .expand-btn,
            .task-item .task-actions button {
                width: 32px;
                height: 32px;
            }
            .task-item .checkbox {
                width: 24px;
                height: 24px;
            }
            .task-item .checkbox svg {
                width: 16px;
                height: 16px;
            }
            .subtask-list {
                padding-left: 32px;
            }
            .subtask-item .checkbox {
                width: 22px;
                height: 22px;
            }
            .subtask-item .checkbox svg {
                width: 14px;
                height: 14px;
            }
            .modal-box {
                padding: 20px 20px calc(20px + var(--safe-bottom));
                max-height: 70vh;
            }
            .stats-dashboard {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding: 12px;
            }
            .calendar-grid .cal-cell {
                min-height: 50px;
                padding: 4px 2px;
            }
            .calendar-grid .cal-cell .cal-day-num {
                font-size: 12px;
            }
            .calendar-grid .cal-cell .cal-dot .dot {
                width: 4px;
                height: 4px;
            }
            .task-item .drag-handle {
                display: none;
            }
        }
        @media (max-width: 480px) {
            .sidebar {
                width: 240px;
            }
            .content-header {
                padding: 12px 12px 10px 12px;
            }
            .content-header h1 {
                max-width: 80px;
                font-size: 16px;
            }
            .header-actions button {
                padding: 4px;
            }
            .header-actions svg {
                width: 18px;
                height: 18px;
            }
            .todo-container {
                margin: 0 8px 8px 8px;
                padding: 10px 0 8px 0;
            }
            .todo-list {
                padding: 4px 6px 0 6px;
                gap: 4px;
            }
            .task-item {
                padding: 8px 6px;
                gap: 6px;
            }
            .task-item .content-text {
                font-size: 13px;
                min-width: 60px;
            }
            .task-item .expand-btn,
            .task-item .task-actions button {
                width: 28px;
                height: 28px;
            }
            .task-item .checkbox {
                width: 20px;
                height: 20px;
            }
            .task-item .checkbox svg {
                width: 14px;
                height: 14px;
            }
            .subtask-list {
                padding-left: 24px;
            }
            .subtask-item .checkbox {
                width: 20px;
                height: 20px;
            }
            .subtask-item .checkbox svg {
                width: 12px;
                height: 12px;
            }
            .add-task-row {
                padding: 8px 6px;
                gap: 8px;
            }
            .add-task-row input {
                font-size: 14px;
            }
            .add-task-row button {
                font-size: 13px;
                padding: 6px 12px;
            }
            .add-subtask-row input {
                font-size: 13px;
            }
            .add-subtask-row button {
                font-size: 13px;
                padding: 6px 12px;
            }
            .modal-box {
                padding: 16px 16px calc(16px + var(--safe-bottom));
            }
            .login-box {
                padding: 24px 20px;
            }
            .login-box .form-group input {
                font-size: 15px;
            }
            .stats-dashboard {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                padding: 8px;
            }
            .stats-card {
                padding: 12px;
            }
            .stats-card .stats-number {
                font-size: 22px;
            }
            .calendar-grid .cal-cell {
                min-height: 40px;
                padding: 2px 2px;
            }
            .calendar-grid .cal-cell .cal-day-num {
                font-size: 11px;
            }
            .calendar-grid .cal-cell .cal-dot .dot {
                width: 3px;
                height: 3px;
            }
            .calendar-grid .cal-cell .cal-count {
                font-size: 8px;
                bottom: 1px;
                right: 3px;
            }
        }

        /* 遮罩层 */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1500;
        }
        .sidebar-overlay.active {
            display: block;
        }
        @media (min-width: 769px) {
            .sidebar-overlay {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <!-- ===== 登录界面 ===== -->
    <div id="loginOverlay">
        <div class="login-box">
            <h2 id="loginTitle">登录</h2>
            <p class="sub" id="loginSub">使用您的账号继续</p>
            <div id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" />
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" />
                </div>
                <div class="error-msg" id="loginError"></div>
                <div class="actions">
                    <button class="btn-primary" id="loginBtn">登录</button>
                    <button class="btn-secondary" id="registerBtn">注册新账号</button>
                </div>
                <div class="switch-mode">
                    <span id="switchHint">还没有账号？</span>
                    <a id="switchModeLink">注册</a>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 主界面 ===== -->
    <div class="app-container" id="appContainer" style="display:none;">
        <!-- 侧边栏遮罩 -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <button class="close-sidebar" id="closeSidebarBtn">✕</button>
            <div class="profile-section">
                <div class="profile-avatar" id="avatarDisplay">U</div>
                <div class="profile-info">
                    <span class="name" id="usernameDisplay">用户</span>
                    <span class="email" id="logoutBtn" title="点击退出登录">退出登录</span>
                </div>
            </div>
            <div class="search-box">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" placeholder="搜索任务" id="searchInput" />
            </div>
            <ul class="nav-list" id="groupList">
                <!-- 视图导航 -->
                <li class="nav-view-item active" data-view="list">
                    <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                    <span>列表视图</span>
                </li>
                <li class="nav-view-item" data-view="stats">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                    <span>统计看板</span>
                </li>
                <li class="nav-view-item" data-view="calendar">
                    <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
                    <span>日历视图</span>
                </li>
                <li class="nav-divider"></li>
                <!-- 任务组列表会动态插入到这里 -->
                <li class="bottom-action" id="addGroupBtn">
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    新建列表
                </li>
            </ul>
        </aside>

        <!-- 主内容 -->
        <main class="main-content">
            <header class="content-header">

        function formatDateDisplay(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const diffDays = Math.floor((target - today) / (86400000));
            if (diffDays === 0) return '今天';
            if (diffDays === 1) return '明天';
            if (diffDays === -1) return '昨天';
            if (diffDays > 0 && diffDays <= 7) return diffDays + '天后';
            if (diffDays < 0 && diffDays >= -7) return (-diffDays) + '天前';
            return (d.getMonth() + 1) + '/' + d.getDate();
        }

            const diffDays = Math.floor((target - today) / (86400000));

        async function fetchToken() {
            try {
                const resp = await fetch(STATE.jsonbinTokenUrl);
                if (!resp.ok) throw new Error('无法获取 Token');
                const data = await resp.json();
                const token = data.record?.github_token || data.record?.token || data.token;

                return token;
            } catch (e) {
                console.error('获取 Token 失败:', e);

                return null;
            }
        }

        function utf8ToBase64(str) {
            const encoder = new TextEncoder();
            const bytes = encoder.encode(str);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        function base64ToUtf8(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const decoder = new TextDecoder('utf-8');
            return decoder.decode(bytes);
        }

        async function fetchAppData() {
            if (!STATE.token) return null;
            try {
                const url =
                    `https://api.github.com/repos/${STATE.repoOwner}/${STATE.repoName}/contents/${STATE.dataFile}`;
                const resp = await fetch(url, {
                    headers: { 'Authorization': `token ${STATE.token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (resp.status === 404) return { users: {}, todos: {} };
                if (!resp.ok) throw new Error('获取数据失败');
                const data = await resp.json();
                const decoded = base64ToUtf8(data.content);
                return JSON.parse(decoded);
            } catch (e) { console.error('fetchAppData error:', e); return null; }
        }

        async function saveAppData(data) {
            if (!STATE.token) return false;
            try {
                const jsonStr = JSON.stringify(data, null, 2);
                const content = utf8ToBase64(jsonStr);
                const url =
                    `https://api.github.com/repos/${STATE.repoOwner}/${STATE.repoName}/contents/${STATE.dataFile}`;
                let currentSha = null;
                const infoResp = await fetch(url, {
                    headers: { 'Authorization': `token ${STATE.token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (infoResp.ok) { const info = await infoResp.json();
                    currentSha = info.sha; } else if (infoResp.status !== 404) { throw new Error(
                        `获取文件信息失败: ${infoResp.status}`); }
                const payload = { message: '更新 app_data', content, branch: 'main' };
                if (currentSha) payload.sha = currentSha;
                const resp = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${STATE.token}`, 'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!resp.ok) { const errText = await resp.text(); throw new Error(`保存失败: ${resp.status}`); }
                return true;
            } catch (e) { console.error('saveAppData error:', e); return false; }
        }

        // ============================================================
        //  同步
        // ============================================================
        async function pullFromGitHub() {
    if (STATE.isSyncing) return false;
    const fetched = await fetchAppData();
    if (fetched === null) return false;
    STATE.users = fetched.users || {};
    STATE.todos = fetched.todos || {};
    if (STATE.currentUser && STATE.todos[STATE.currentUser]) {
        STATE.groups = STATE.todos[STATE.currentUser].groups || [];
        sortByOrder(STATE.groups);
        if (!STATE.groups.some(g => g.id === STATE.currentGroupId)) {
            STATE.currentGroupId = STATE.groups.length > 0 ? STATE.groups[0].id : null;
        }
        renderAll();  // 这里会调用 renderStats(false)
        setSyncStatus('已更新');
    } else { setSyncStatus('已同步'); }
    return true;
}

        async function syncToGitHub() {
            if (STATE.isSyncing) { STATE.pendingSave = true; return; }
            STATE.isSyncing = true;
            setSyncStatus('同步中...');
            try {
                const fullData = { users: STATE.users, todos: STATE.todos };
                const ok = await saveAppData(fullData);
                if (ok) { setSyncStatus('已同步'); await pullFromGitHub(); } else { setSyncStatus('同步失败'); }
            } catch (e) { setSyncStatus('同步出错'); } finally {
                STATE.isSyncing = false;
                if (STATE.pendingSave) { STATE.pendingSave = false;
                    syncToGitHub(); }
            }
        }

        function saveAndSync() {
    if (STATE.currentUser) {
        if (!STATE.todos[STATE.currentUser]) STATE.todos[STATE.currentUser] = { groups: [] };
        STATE.todos[STATE.currentUser].groups = STATE.groups;
    }
    // 数据已变更，重置图表快照
    STATE.lastStatsSnapshot = null;
    renderAll();
    syncToGitHub();
}

        // ============================================================
        //  格式化语法 (步骤生成)
        // ============================================================
        const TYPE_MAP = { 'P': '第{num}页', 'S': '第{num}步', 'Q': '第{num}课时', 'W': '第{num}周', 'T': '第{num}天', 'H': '第{num}小时',
            'U': '第{num}单元', '#': '{num}' };

        function parseRange(rangeStr) {
            rangeStr = rangeStr.trim();
            if (/^[\d\s,]+$/.test(rangeStr)) {
                const nums = rangeStr.split(',').map(s => parseInt(s.trim(), 10));
                if (nums.every(n => !isNaN(n) && n > 0)) return nums;
                return null;
            }
            const match = rangeStr.match(/^(\d+)\s*-\s*(\d+)(?:\s*:\s*(\d+))?$/);
            if (match) {
                const start = parseInt(match[1], 10),
                    end = parseInt(match[2], 10),
                    step = match[3] ? parseInt(match[3], 10) : 1;
                if (isNaN(start) || isNaN(end) || isNaN(step) || step < 1) return null;
                const result = [];
                if (start <= end) { for (let i = start; i <= end; i += step) result.push(i); } else { for (let i =
                        start; i >= end; i -= step) result.push(i); }
                return result;
            }
            return null;
        }

        function parseBlock(blockContent) {
            blockContent = blockContent.trim();
            if (blockContent.includes('&')) {
                const parts = blockContent.split('&').map(s => s.trim());
                const dimensions = [];
                for (const part of parts) {
                    const match = part.match(/^([A-Z#])(.+?)(?:\|(.+))?$/);
                    if (!match) return null;
                    const type = match[1],
                        rangeStr = match[2].trim(),
                        template = match[3] ? match[3].trim() : null;
                    if (!TYPE_MAP[type]) return null;
                    const nums = parseRange(rangeStr);
                    if (!nums) return null;
                    dimensions.push({ type, nums, template: template || TYPE_MAP[type] });
                }
                const minLen = Math.min(...dimensions.map(d => d.nums.length));
                if (minLen === 0) return null;
                return { type: 'pair', dimensions, length: minLen };
            } else {
                const match = blockContent.match(/^([A-Z#])(.+?)(?:\|(.+))?$/);
                if (!match) return null;
                const type = match[1],
                    rangeStr = match[2].trim(),
                    template = match[3] ? match[3].trim() : null;
                if (!TYPE_MAP[type]) return null;
                const nums = parseRange(rangeStr);
                if (!nums) return null;
                return { type: 'single', nums, template: template || TYPE_MAP[type] };
            }
        }

        function expandBlock(block) {
            if (block.type === 'single') return block.nums.map(num => block.template.replace(/\{num\}/g, num));
            else if (block.type === 'pair') {
                const dims = block.dimensions,
                    len = block.length,
                    results = [];
                for (let i = 0; i < len; i++) {
                    results.push(dims.map(d => d.template.replace(/\{num\}/g, d.nums[i])).join(' '));
                }
                return results;
            }
            return [];
        }

        function parseStepName(input) {
            const escaped = input.replace(/%%/g, '\uFFFF');
            const regex = /%([^%]+?)%/g;
            let match,
                lastIndex = 0,
                blocks = [],
                textParts = [],
                hasBlock = false;
            while ((match = regex.exec(escaped)) !== null) {
                hasBlock = true;
                const before = escaped.substring(lastIndex, match.index);
                if (before) textParts.push(before);
                const content = match[1];
                const parsed = parseBlock(content);
                if (!parsed) return null;
                blocks.push(parsed);
                lastIndex = match.index + match[0].length;
            }
            if (lastIndex < escaped.length) { const remaining = escaped.substring(lastIndex); if (remaining) textParts.push(
                    remaining); }
            if (!hasBlock) return { displayName: input, steps: [] };
            const displayName = textParts.join('').replace(/\uFFFF/g, '%');
            let allSteps = [];
            for (const block of blocks) { allSteps = allSteps.concat(expandBlock(block)); }
            return { displayName: displayName || '', steps: allSteps };
        }

        // ============================================================

        let sortableInstance = null;

        function initSortable() {
            // 确保 Sortable 已定义
            if (typeof Sortable === 'undefined') {
                console.warn('Sortable 未加载，拖拽功能不可用');
                return;
            }
            if (sortableInstance) {
                sortableInstance.destroy();
                sortableInstance = null;
            }
            const container = todoList;
            if (!container) return;
            const items = container.querySelectorAll('.task-item-wrapper');
            if (items.length < 2) return;
            sortableInstance = Sortable.create(container, {
                handle: '.drag-handle',
                draggable: '.task-item-wrapper',
                animation: 150,
                onEnd: function(evt) {
                    const group = STATE.groups.find(g => g.id === STATE.currentGroupId);
                    if (!group) return;
                    const tasks = group.tasks || [];
                    const fromIndex = evt.oldIndex;
                    const toIndex = evt.newIndex;
                    if (fromIndex === toIndex) return;
                    const items = container.querySelectorAll('.task-item-wrapper');
                    const taskIds = [];
                    items.forEach(el => {
                        const id = el.dataset.taskId;
                        if (id) taskIds.push(id);
                    });
                    const newTasks = [];
                    taskIds.forEach(id => {
                        const t = tasks.find(tk => tk.id === id);
                        if (t) newTasks.push(t);
                    });
                    newTasks.forEach((t, idx) => { t.order = idx; });
                    group.tasks = newTasks;
                    saveAndSync();
                },
                filter: '.add-task-row',
                preventOnFilter: false,
                touchStartThreshold: 5,
            });
        }

        function renderStats(forceRecreate = false) {
    const group = STATE.groups.find(g => g.id === STATE.currentGroupId);
    if (!group) {
        statsContent.innerHTML = `<div class="stats-empty">请先选择一个任务组</div>`;
        STATE.statsInitialized = false;
        STATE.lastGroupId = null;
        if (STATE.chartInstance) {
            STATE.chartInstance.destroy();
            STATE.chartInstance = null;
        }
        return;
    }

    const tasks = group.tasks || [];
    let totalTasks = tasks.length;
    let completedTasks = tasks.filter(t => t.completed).length;
    let overdueTasks = tasks.filter(t => t.dueDate && isOverdue(t.dueDate) && !t.completed).length;
    let dueSoonTasks = tasks.filter(t => t.dueDate && isDueSoon(t.dueDate) && !t.completed && !isOverdue(t.dueDate)).length;
    let totalSteps = 0, completedSteps = 0;
    tasks.forEach(t => {
        if (t.subtasks) {
            totalSteps += t.subtasks.length;
            completedSteps += t.subtasks.filter(s => s.completed).length;
        }
    });
    const taskCompletionRate = totalTasks === 0 ? 0 : ((completedTasks / totalTasks) * 100);
    const stepCompletionRate = totalSteps === 0 ? 0 : ((completedSteps / totalSteps) * 100);

    const currentSnapshot = JSON.stringify({ totalTasks, completedTasks, totalSteps, completedSteps });
    const dataChanged = STATE.lastStatsSnapshot !== currentSnapshot;

    // 如果组变了，强制重建
    if (STATE.lastGroupId !== group.id) {
        forceRecreate = true;
        STATE.lastGroupId = group.id;
    }

    // 获取当前图表模式
    const mode = STATE.chartMode || 'task';

    // ----- 首次渲染 或 强制重建 -----
    if (!STATE.statsInitialized || forceRecreate) {
        // 生成完整 HTML（包含统计卡片、切换按钮、canvas）
        let html = `
            <div class="stats-group-name">${escapeHtml(group.name)}</div>

            </div>

        const canvas = document.getElementById('statsChart');

            }
            if (data[0] + data[1] === 0) {
                STATE.chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels: ['暂无数据'], datasets: [{ data: [1], backgroundColor: ['#e5e7eb'], borderWidth: 0 }] },
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, cutout: '70%' }
                });
            } else {
                STATE.chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: { position: 'bottom', labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim() || '#1f2937' } }
                        },

                    }
                });
            }
            STATE.chartMode = mode;
        }

        STATE.lastStatsSnapshot = currentSnapshot;

        // 绑定切换按钮事件（只绑定一次，使用事件委托或一次性绑定）
        // 因为 HTML 重新生成，需要重新绑定

        const overdueEl = cards[3].querySelector('.stats-number');

        const dueSoonEl = cards[4].querySelector('.stats-number');
        dueSoonEl.textContent = dueSoonTasks;

        cards[5].querySelector('.stats-number').textContent = taskCompletionRate.toFixed(2) + '%';
        cards[6].querySelector('.stats-number').textContent = totalSteps;
        cards[7].querySelector('.stats-number').textContent = completedSteps;
        cards[8].querySelector('.stats-number').textContent = stepCompletionRate.toFixed(2) + '%';
    }

    // 更新图表数据（无动画）
    if (STATE.chartInstance) {

        // 如果新旧数据完全相同则跳过
        const oldData = chart.data.datasets[0].data;
        if (oldData.length === 2 && oldData[0] === newData[0] && oldData[1] === newData[1]) {
            // 数据未变，但可能快照未更新，更新快照
            STATE.lastStatsSnapshot = currentSnapshot;

        }
        chart.data.datasets[0].data = newData;

    }

    STATE.lastStatsSnapshot = currentSnapshot;
