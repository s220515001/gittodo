<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>GitTodo · 任务管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
    <style>
        /* ===== CSS 变量（浅色/深色） ===== */
        :root {
            --bg-primary: #f6f8fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f0f2f5;
            --bg-hover: #eef2f7;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: #dbeafe;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #22c55e;
            --checkbox-size: 22px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        [data-theme="dark"] {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --bg-input: #2d3748;
            --bg-hover: #2d3748;
            --text-primary: #e6edf3;
            --text-secondary: #b0c4de;
            --text-muted: #6e7a8a;
            --border-color: #30363d;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.6);
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --accent-light: #1f2a3f;
            --danger: #f85149;
            --danger-hover: #da3633;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
            padding: 20px 16px 40px;
            display: flex;
            justify-content: center;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            max-width: 700px;
            width: 100%;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .theme-toggle:hover {
            background: var(--bg-hover);
            transform: scale(1.03);
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sync-status {
            font-size: 13px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            transition: 0.3s;
        }
        .sync-dot.syncing {
            background: #f59e0b;
            animation: pulse-dot 1s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .groups-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .group-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: box-shadow var(--transition), border var(--transition);
        }

        .group-card:hover {
            box-shadow: var(--shadow-md);
        }

        .group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
            flex-wrap: wrap;
        }

        .group-title-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .group-title-input {
            font-size: 18px;
            font-weight: 600;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 4px 0;
            width: 100%;
            min-width: 80px;
            outline: none;
            font-family: var(--font);
            letter-spacing: -0.2px;
            border-bottom: 2px solid transparent;
            transition: border var(--transition);
        }

        .group-title-input:focus {
            border-bottom-color: var(--accent);
        }

        .group-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .btn-icon {
            background: transparent;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--transition);
        }

        .btn-icon:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .btn-icon.danger:hover {
            background: #fee2e2;
            color: var(--danger);
        }
        [data-theme="dark"] .btn-icon.danger:hover {
            background: #2d1b1b;
            color: var(--danger);
        }

        .btn-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .task-list {
            padding: 8px 12px 12px;
            min-height: 60px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            margin-bottom: 6px;
            border: 1px solid transparent;
            transition: all var(--transition);
            cursor: grab;
            position: relative;
        }

        .task-item:hover {
            background: var(--bg-hover);
            border-color: var(--border-color);
        }
        .task-item.dragging {
            opacity: 0.5;
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }

        .task-checkbox {
            flex-shrink: 0;
            width: var(--checkbox-size);
            height: var(--checkbox-size);
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
            color: white;
            -webkit-appearance: none;
            appearance: none;
            position: relative;
        }

        .task-checkbox:checked {
            background: var(--accent);
            border-color: var(--accent);
        }
        .task-checkbox:checked::after {
            content: '✓';
            font-size: 14px;
            color: white;
            font-weight: 700;
            line-height: 1;
        }
        .task-checkbox:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .task-content {
            flex: 1;
            font-size: 15px;
            color: var(--text-primary);
            word-break: break-word;
            min-width: 0;
        }

        .task-content.completed {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-edit-input {
            flex: 1;
            font-size: 15px;
            font-family: var(--font);
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 10px;
            color: var(--text-primary);
            outline: none;
            transition: border var(--transition);
            min-width: 60px;
        }
        .task-edit-input:focus {
            border-color: var(--accent);
        }

        .task-actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }

        .task-actions .btn-icon {
            width: 30px;
            height: 30px;
        }
        .task-actions .btn-icon svg {
            width: 18px;
            height: 18px;
        }

        .drag-handle {
            cursor: grab;
            color: var(--text-muted);
            padding: 0 4px;
            user-select: none;
            flex-shrink: 0;
        }
        .drag-handle svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .empty-state {
            padding: 30px 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        .add-group-area {
            margin-top: 8px;
        }

        .add-group-btn,
        .add-task-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px dashed var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            font-family: var(--font);
            cursor: pointer;
            transition: all var(--transition);
        }

        .add-group-btn:hover,
        .add-task-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
            color: var(--accent);
        }

        .add-group-btn svg,
        .add-task-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .add-task-inline {
            display: flex;
            gap: 8px;
            padding: 6px 12px 12px;
            align-items: center;
        }

        .add-task-inline input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            font-family: var(--font);
            outline: none;
            transition: border var(--transition);
            min-width: 0;
        }
        .add-task-inline input:focus {
            border-color: var(--accent);
        }

        .add-task-inline .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 14px;
            font-family: var(--font);
            cursor: pointer;
            transition: background var(--transition);
            white-space: nowrap;
        }
        .add-task-inline .btn-primary:hover {
            background: var(--accent-hover);
        }

        @media (max-width: 480px) {
            .app-header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {
                justify-content: space-between;
            }
            .group-header {
                flex-wrap: wrap;
            }
            .group-title-wrapper {
                width: 100%;
            }
            .task-item {
                flex-wrap: wrap;
                padding: 8px 10px;
            }
            .task-content {
                order: 2;
                flex-basis: calc(100% - 60px);
            }
            .task-actions {
                order: 3;
                margin-left: auto;
            }
            .drag-handle {
                order: 0;
            }
            .task-checkbox {
                order: 1;
            }
            .add-task-inline {
                flex-wrap: wrap;
            }
            .add-task-inline input {
                flex: 1 1 100%;
            }
            .add-task-inline .btn-primary {
                width: 100%;
                justify-content: center;
            }
        }

        .hidden {
            display: none !important;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 40px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div id="app">
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">✔</div>
                <h1>GitTodo</h1>
            </div>
            <div class="header-actions">
                <span class="sync-status" id="syncStatus">
                    <span class="sync-dot" id="syncDot"></span>
                    <span id="syncLabel">已同步</span>
                </span>
                <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                    <svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </button>
            </div>
        </header>

        <div id="groupsContainer" class="groups-container">
            <!-- 动态渲染 -->
        </div>

        <div class="add-group-area">
            <button class="add-group-btn" id="addGroupBtn">
                <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                新建任务组
            </button>
        </div>
    </div>

    <script>
        // =====================================================================
        //  全局状态
        // =====================================================================
        const STATE = {
            data: null,
            username: null,
            groups: [],
            token: null,
            repoOwner: 's220515001',
            repoName: 'gittodo',
            filePath: 'todos.json',
            jsonbinTokenUrl: 'https://api.jsonbin.io/v3/b/6a296f88da38895dfea6e9b3',
            pollInterval: 5000,
            pollTimer: null,
            isSyncing: false,
            pendingSave: false,
            theme: 'light',
        };

        // =====================================================================
        //  DOM 引用
        // =====================================================================
        const $ = (sel) => document.querySelector(sel);
        const groupsContainer = $('#groupsContainer');
        const syncStatusLabel = $('#syncLabel');
        const syncDot = $('#syncDot');
        const themeToggle = $('#themeToggle');
        const addGroupBtn = $('#addGroupBtn');

        // =====================================================================
        //  工具函数
        // =====================================================================
        function uuid() {
            return crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2, 8);
        }

        function sortByOrder(arr) {
            arr.sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // =====================================================================
        //  主题管理
        // =====================================================================
        function getPreferredTheme() {
            const stored = localStorage.getItem('gittodo-theme');
            if (stored) return stored;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            STATE.theme = theme;
            document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : '');
            localStorage.setItem('gittodo-theme', theme);
            const svg = themeToggle.querySelector('svg');
            if (theme === 'dark') {
                svg.innerHTML =
                    '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
            } else {
                svg.innerHTML =
                    '<path d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>';
            }
        }

        themeToggle.addEventListener('click', () => {
            applyTheme(STATE.theme === 'light' ? 'dark' : 'light');
        });

        // =====================================================================
        //  获取 GitHub Token（从 jsonbin.io）
        // =====================================================================
        async function fetchToken() {
            try {
                const resp = await fetch(STATE.jsonbinTokenUrl);
                if (!resp.ok) throw new Error('无法获取 Token');
                const data = await resp.json();
                // 修正：从 record.github_token 读取（根据你的反馈）
                const token = data.record?.github_token || data.record?.token || data.token;
                if (!token) throw new Error('Token 不存在');
                return token;
            } catch (e) {
                console.error('获取 Token 失败:', e);
                alert('请先配置 GitHub Token (在 jsonbin.io 中)');
                return null;
            }
        }

        // =====================================================================
        //  GitHub API 操作
        // =====================================================================
        async function getFileSha() {
            const url =
                `https://api.github.com/repos/${STATE.repoOwner}/${STATE.repoName}/contents/${STATE.filePath}`;
            const resp = await fetch(url, {
                headers: {
                    'Authorization': `token ${STATE.token}`,
                    'Accept': 'application/vnd.github.v3+json',
                }
            });
            if (resp.status === 404) return null;
            if (!resp.ok) throw new Error('获取文件信息失败');
            const data = await resp.json();
            return data.sha;
        }

        async function fetchDataFromGitHub() {
            if (!STATE.token) return null;
            try {
                const url =
                    `https://api.github.com/repos/${STATE.repoOwner}/${STATE.repoName}/contents/${STATE.filePath}`;
                const resp = await fetch(url, {
                    headers: {
                        'Authorization': `token ${STATE.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                    }
                });
                if (resp.status === 404) return {};
                if (!resp.ok) throw new Error('获取数据失败');
                const data = await resp.json();
                const content = atob(data.content);
                return JSON.parse(content);
            } catch (e) {
                console.error('fetchDataFromGitHub error:', e);
                return null;
            }
        }

        async function saveDataToGitHub(data) {
            if (!STATE.token) return false;
            try {
                const content = btoa(JSON.stringify(data, null, 2));
                const sha = await getFileSha();
                const payload = {
                    message: '更新 todos',
                    content: content,
                    branch: 'main',
                };
                if (sha) payload.sha = sha;

                const url =
                    `https://api.github.com/repos/${STATE.repoOwner}/${STATE.repoName}/contents/${STATE.filePath}`;
                const resp = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${STATE.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });
                if (!resp.ok) {
                    const errText = await resp.text();
                    console.error('GitHub API 错误:', resp.status, errText);
                    throw new Error(`保存失败: ${resp.status}`);
                }
                return true;
            } catch (e) {
                console.error('saveDataToGitHub error:', e);
                return false;
            }
        }

        // =====================================================================
        //  数据同步
        // =====================================================================
        async function syncToGitHub() {
            if (STATE.isSyncing) {
                STATE.pendingSave = true;
                return;
            }
            STATE.isSyncing = true;
            setSyncStatus('syncing', '同步中...');
            try {
                // 确保数据完整
                if (!STATE.data[STATE.username]) {
                    STATE.data[STATE.username] = { groups: [] };
                }
                STATE.data[STATE.username].groups = STATE.groups;
                const allData = STATE.data;
                const ok = await saveDataToGitHub(allData);
                if (ok) setSyncStatus('ok', '已同步');
                else setSyncStatus('error', '同步失败');
            } catch (e) {
                setSyncStatus('error', '同步出错');
            } finally {
                STATE.isSyncing = false;
                if (STATE.pendingSave) {
                    STATE.pendingSave = false;
                    syncToGitHub();
                }
            }
        }

        async function pullFromGitHub() {
            const fetched = await fetchDataFromGitHub();
            if (fetched === null) return false;
            // 合并：如果本地有未保存的更改，先不覆盖，但我们会将拉取的数据与本地合并（简单策略：如果拉取的数据不同，则使用拉取的数据）
            // 这里我们采用：如果拉取的数据和当前内存数据不同，则更新内存并重新渲染
            // 但在乐观更新下，本地数据可能比远程新，所以我们可以选择不覆盖本地修改。
            // 更安全的做法：仅当本地没有待保存修改时才拉取，但为了简单，我们保留当前逻辑。
            const currentStr = JSON.stringify(STATE.data);
            const newStr = JSON.stringify(fetched);
            if (currentStr !== newStr) {
                STATE.data = fetched;
                // 确保用户存在
                if (!STATE.data[STATE.username]) {
                    STATE.data[STATE.username] = { groups: [] };
                }
                STATE.groups = STATE.data[STATE.username].groups || [];
                sortByOrder(STATE.groups);
                renderAll();
                setSyncStatus('ok', '已更新');
                return true;
            }
            setSyncStatus('ok', '已同步');
            return true;
        }

        // =====================================================================
        //  渲染
        // =====================================================================
        function renderAll() {
            renderGroups();
        }

        function renderGroups() {
            if (!STATE.groups) STATE.groups = [];
            if (STATE.groups.length === 0) {
                groupsContainer.innerHTML = `
                    <div class="empty-state">
                        <p style="margin-bottom: 8px;">还没有任务组</p>
                        <p style="font-size:13px;">点击下方「新建任务组」开始</p>
                    </div>
                `;
                return;
            }
            let html = '';
            STATE.groups.forEach((group, idx) => {
                const tasks = group.tasks || [];
                sortByOrder(tasks);
                html += `
                    <div class="group-card" data-group-id="${group.id}">
                        <div class="group-header">
                            <div class="group-title-wrapper">
                                <input class="group-title-input" type="text" value="${escapeHtml(group.name)}" 
                                       data-group-id="${group.id}" placeholder="任务组名称" />
                            </div>
                            <div class="group-actions">
                                <button class="btn-icon add-task-btn" data-group-id="${group.id}" title="添加任务">
                                    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                                </button>
                                <button class="btn-icon danger delete-group-btn" data-group-id="${group.id}" title="删除任务组">
                                    <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
                                </button>
                            </div>
                        </div>
                        <div class="task-list" data-group-id="${group.id}">
                            ${tasks.length === 0 ? '<div class="empty-state" style="padding:16px 0;font-size:13px;">暂无任务</div>' : ''}
                            ${tasks.map((task, tIdx) => `
                                <div class="task-item" draggable="true" data-group-id="${group.id}" data-task-id="${task.id}" data-order="${task.order ?? tIdx}">
                                    <span class="drag-handle">
                                        <svg viewBox="0 0 24 24"><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>
                                    </span>
                                    <input type="checkbox" class="task-checkbox" data-group-id="${group.id}" data-task-id="${task.id}" 
                                           ${task.completed ? 'checked' : ''} />
                                    <span class="task-content ${task.completed ? 'completed' : ''}" data-group-id="${group.id}" data-task-id="${task.id}">
                                        ${escapeHtml(task.content)}
                                    </span>
                                    <div class="task-actions">
                                        <button class="btn-icon edit-task-btn" data-group-id="${group.id}" data-task-id="${task.id}" title="编辑">
                                            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                        </button>
                                        <button class="btn-icon danger delete-task-btn" data-group-id="${group.id}" data-task-id="${task.id}" title="删除">
                                            <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                            <div class="add-task-inline" data-group-id="${group.id}">
                                <input type="text" class="add-task-input" placeholder="输入新任务…" />
                                <button class="btn-primary add-task-confirm" data-group-id="${group.id}">添加</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            groupsContainer.innerHTML = html;
            bindEvents();
        }

        // =====================================================================
        //  事件绑定
        // =====================================================================
        function bindEvents() {
            // 任务组标题修改
            document.querySelectorAll('.group-title-input').forEach(input => {
                input.removeEventListener('change', handleGroupTitleChange);
                input.addEventListener('change', handleGroupTitleChange);
            });

            // 添加任务按钮 (组标题旁的 +)
            document.querySelectorAll('.add-task-btn').forEach(btn => {
                btn.removeEventListener('click', handleAddTaskBtn);
                btn.addEventListener('click', handleAddTaskBtn);
            });

            // 删除任务组
            document.querySelectorAll('.delete-group-btn').forEach(btn => {
                btn.removeEventListener('click', handleDeleteGroup);
                btn.addEventListener('click', handleDeleteGroup);
            });

            // 任务复选框
            document.querySelectorAll('.task-checkbox').forEach(cb => {
                cb.removeEventListener('change', handleTaskToggle);
                cb.addEventListener('change', handleTaskToggle);
            });

            // 编辑任务
            document.querySelectorAll('.edit-task-btn').forEach(btn => {
                btn.removeEventListener('click', handleEditTask);
                btn.addEventListener('click', handleEditTask);
            });

            // 删除任务
            document.querySelectorAll('.delete-task-btn').forEach(btn => {
                btn.removeEventListener('click', handleDeleteTask);
                btn.addEventListener('click', handleDeleteTask);
            });

            // 添加任务 (内联)
            document.querySelectorAll('.add-task-confirm').forEach(btn => {
                btn.removeEventListener('click', handleAddTaskConfirm);
                btn.addEventListener('click', handleAddTaskConfirm);
            });
            document.querySelectorAll('.add-task-input').forEach(inp => {
                inp.removeEventListener('keydown', handleAddTaskKeydown);
                inp.addEventListener('keydown', handleAddTaskKeydown);
            });

            // 拖拽
            document.querySelectorAll('.task-item').forEach(item => {
                item.removeEventListener('dragstart', handleDragStart);
                item.removeEventListener('dragend', handleDragEnd);
                item.removeEventListener('dragover', handleDragOver);
                item.removeEventListener('drop', handleDrop);
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragend', handleDragEnd);
                item.addEventListener('dragover', handleDragOver);
                item.addEventListener('drop', handleDrop);
            });
        }

        // ---- 事件处理函数 ----
        function handleGroupTitleChange(e) {
            const input = e.target;
            const groupId = input.dataset.groupId;
            const newName = input.value.trim() || '未命名';
            const group = STATE.groups.find(g => g.id === groupId);
            if (group) {
                group.name = newName;
                saveAndSync();
            }
        }

        function handleAddTaskBtn(e) {
            const groupId = e.currentTarget.dataset.groupId;
            const card = document.querySelector(`.group-card[data-group-id="${groupId}"]`);
            const input = card.querySelector('.add-task-input');
            if (input) {
                input.focus();
                input.select();
            }
        }

        function handleDeleteGroup(e) {
            const groupId = e.currentTarget.dataset.groupId;
            if (!confirm('确定删除此任务组及其所有任务吗？')) return;
            STATE.groups = STATE.groups.filter(g => g.id !== groupId);
            saveAndSync();
        }

        function handleTaskToggle(e) {
            const cb = e.target;
            const groupId = cb.dataset.groupId;
            const taskId = cb.dataset.taskId;
            const group = STATE.groups.find(g => g.id === groupId);
            if (group) {
                const task = group.tasks.find(t => t.id === taskId);
                if (task) {
                    task.completed = cb.checked;
                    task.completedAt = cb.checked ? Date.now() : null;
                    const content = cb.closest('.task-item').querySelector('.task-content');
                    if (content) content.classList.toggle('completed', cb.checked);
                    saveAndSync();
                }
            }
        }

        function handleEditTask(e) {
            const btn = e.currentTarget;
            const groupId = btn.dataset.groupId;
            const taskId = btn.dataset.taskId;
            const group = STATE.groups.find(g => g.id === groupId);
            if (!group) return;
            const task = group.tasks.find(t => t.id === taskId);
            if (!task) return;
            const item = btn.closest('.task-item');
            const contentSpan = item.querySelector('.task-content');
            const currentText = task.content;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'task-edit-input';
            input.value = currentText;
            input.dataset.groupId = groupId;
            input.dataset.taskId = taskId;
            contentSpan.replaceWith(input);
            input.focus();
            input.select();

            const finishEdit = () => {
                const newText = input.value.trim() || currentText;
                task.content = newText;
                const newSpan = document.createElement('span');
                newSpan.className = `task-content ${task.completed ? 'completed' : ''}`;
                newSpan.dataset.groupId = groupId;
                newSpan.dataset.taskId = taskId;
                newSpan.textContent = newText;
                input.replaceWith(newSpan);
                saveAndSync();
            };

            input.addEventListener('blur', finishEdit);
            input.addEventListener('keydown', (ev) => {
                if (ev.key === 'Enter') {
                    ev.preventDefault();
                    input.blur();
                }
                if (ev.key === 'Escape') {
                    input.value = currentText;
                    input.blur();
                }
            });
        }

        function handleDeleteTask(e) {
            const btn = e.currentTarget;
            const groupId = btn.dataset.groupId;
            const taskId = btn.dataset.taskId;
            if (!confirm('确定删除此任务吗？')) return;
            const group = STATE.groups.find(g => g.id === groupId);
            if (group) {
                group.tasks = group.tasks.filter(t => t.id !== taskId);
                saveAndSync();
            }
        }

        function handleAddTaskConfirm(e) {
            const btn = e.currentTarget;
            const groupId = btn.dataset.groupId;
            const card = document.querySelector(`.group-card[data-group-id="${groupId}"]`);
            const input = card.querySelector('.add-task-input');
            const text = input.value.trim();
            if (!text) return;
            const group = STATE.groups.find(g => g.id === groupId);
            if (group) {
                const task = {
                    id: uuid(),
                    content: text,
                    completed: false,
                    order: group.tasks.length,
                    createdAt: Date.now(),
                    completedAt: null,
                };
                group.tasks.push(task);
                input.value = '';
                saveAndSync();
            }
        }

        function handleAddTaskKeydown(e) {
            if (e.key === 'Enter') {
                const input = e.target;
                const groupId = input.closest('.add-task-inline').dataset.groupId;
                const btn = document.querySelector(`.add-task-confirm[data-group-id="${groupId}"]`);
                if (btn) btn.click();
            }
        }

        // ---- 拖拽 ----
        let dragData = null;

        function handleDragStart(e) {
            const item = e.target.closest('.task-item');
            if (!item) return;
            const groupId = item.dataset.groupId;
            const taskId = item.dataset.taskId;
            dragData = { groupId, taskId };
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', taskId);
            item.classList.add('dragging');
        }

        function handleDragEnd(e) {
            document.querySelectorAll('.task-item').forEach(el => el.classList.remove('dragging'));
            dragData = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const targetItem = e.target.closest('.task-item');
            if (targetItem) {
                targetItem.style.borderColor = 'var(--accent)';
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            const targetItem = e.target.closest('.task-item');
            if (targetItem) targetItem.style.borderColor = '';
            if (!dragData) return;

            const fromGroupId = dragData.groupId;
            const fromTaskId = dragData.taskId;
            const toGroupId = targetItem ? targetItem.dataset.groupId : null;
            const toTaskId = targetItem ? targetItem.dataset.taskId : null;

            if (!toGroupId || !toTaskId) return;
            if (fromGroupId === toGroupId && fromTaskId === toTaskId) return;

            const fromGroup = STATE.groups.find(g => g.id === fromGroupId);
            const toGroup = STATE.groups.find(g => g.id === toGroupId);
            if (!fromGroup || !toGroup) return;

            const fromTasks = fromGroup.tasks;
            const toTasks = toGroup.tasks;
            const fromIdx = fromTasks.findIndex(t => t.id === fromTaskId);
            const toIdx = toTasks.findIndex(t => t.id === toTaskId);
            if (fromIdx === -1 || toIdx === -1) return;

            if (fromGroupId !== toGroupId) {
                const [moved] = fromTasks.splice(fromIdx, 1);
                toTasks.splice(toIdx, 0, moved);
                fromTasks.forEach((t, i) => t.order = i);
                toTasks.forEach((t, i) => t.order = i);
            } else {
                const [moved] = fromTasks.splice(fromIdx, 1);
                fromTasks.splice(toIdx, 0, moved);
                fromTasks.forEach((t, i) => t.order = i);
            }
            saveAndSync();
        }

        // =====================================================================
        //  新建任务组（修复 undefined 错误）
        // =====================================================================
        function handleAddGroup() {
            const name = prompt('请输入新任务组的名称：', '新任务组');
            if (name === null) return;

            // 确保用户数据存在
            if (!STATE.data[STATE.username]) {
                STATE.data[STATE.username] = { groups: [] };
            }

            const newGroup = {
                id: uuid(),
                name: name.trim() || '未命名',
                order: STATE.groups.length,
                createdAt: Date.now(),
                tasks: [],
            };

            STATE.groups.push(newGroup);
            // 立即更新 data 并同步
            saveAndSync();
        }

        // =====================================================================
        //  保存并同步（乐观更新）
        // =====================================================================
        function saveAndSync() {
            // 确保用户数据存在
            if (!STATE.data[STATE.username]) {
                STATE.data[STATE.username] = { groups: [] };
            }
            STATE.data[STATE.username].groups = STATE.groups;
            // 乐观更新 UI
            renderAll();
            // 异步保存到 GitHub
            syncToGitHub();
        }

        // =====================================================================
        //  状态指示器
        // =====================================================================
        function setSyncStatus(status, label) {
            const dot = syncDot;
            const labelEl = syncStatusLabel;
            dot.className = 'sync-dot';
            if (status === 'syncing') {
                dot.classList.add('syncing');
                labelEl.textContent = label || '同步中…';
            } else if (status === 'error') {
                dot.style.background = 'var(--danger)';
                labelEl.textContent = label || '同步失败';
            } else {
                dot.style.background = 'var(--success)';
                labelEl.textContent = label || '已同步';
            }
        }

        // =====================================================================
        //  轮询
        // =====================================================================
        function startPolling() {
            if (STATE.pollTimer) clearInterval(STATE.pollTimer);
            STATE.pollTimer = setInterval(async () => {
                if (document.hidden) return;
                await pullFromGitHub();
            }, STATE.pollInterval);
        }

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                pullFromGitHub();
            }
        });

        // =====================================================================
        //  初始化
        // =====================================================================
        async function init() {
            applyTheme(getPreferredTheme());

            const token = await fetchToken();
            if (!token) return;
            STATE.token = token;

            const data = await fetchDataFromGitHub();
            if (data === null) {
                alert('无法获取数据，请检查网络或 Token 权限');
                return;
            }
            STATE.data = data;

            // 确定用户名
            let username = Object.keys(data)[0];
            if (!username) {
                try {
                    const userResp = await fetch('https://api.github.com/user', {
                        headers: { 'Authorization': `token ${token}` }
                    });
                    if (userResp.ok) {
                        const user = await userResp.json();
                        username = user.login;
                    }
                } catch (e) {}
                if (!username) username = 'default';
            }
            STATE.username = username;

            // 确保用户数据存在
            if (!STATE.data[STATE.username]) {
                STATE.data[STATE.username] = { groups: [] };
            }
            STATE.groups = STATE.data[STATE.username].groups || [];
            sortByOrder(STATE.groups);

            renderAll();
            startPolling();
            setSyncStatus('ok', '已就绪');

            // 绑定新建任务组按钮
            addGroupBtn.addEventListener('click', handleAddGroup);
        }

        // =====================================================================
        //  启动
        // =====================================================================
        init().catch(err => {
            console.error('初始化失败:', err);
            alert('初始化失败，请检查控制台错误');
        });
    </script>
</body>
</html>
